<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProdRys — edytor instrukcji produkcyjnych</title>
<style>
:root{
  --bg:#1b1e23; --panel:#22262c; --panel2:#282d34; --line:#343a43;
  --txt:#d8dce2; --txt2:#8b93a0; --acc:#ffb020; --acc2:#e09000;
  --canvas:#eef0f3; --grid:#dde1e7; --sel:#1d7fd4; --guide:#e6007e;
  font-size:14px;
}
*{box-sizing:border-box; margin:0; padding:0;}
/* brak zaznaczania tekstu UI (np. przy przeciąganiu w Edge); tylko pola i edytor tekstu */
body{-webkit-user-select:none; user-select:none;}
input, textarea, #txtEd, [contenteditable]{-webkit-user-select:text; user-select:text;}
html,body{height:100%; overflow:hidden;}
body{
  font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--txt);
  display:grid; grid-template-rows:46px 32px 1fr 30px;
  grid-template-columns:46px 1fr 272px;
  grid-template-areas:"tb tb tb" "tabs tabs tabs" "rail canvas side" "status status status";
}
/* ---------- top bar ---------- */
.tb{grid-area:tb; display:flex; align-items:center; gap:8px; padding:0 10px;
  background:var(--panel); border-bottom:1px solid var(--line);}
.logo{width:28px;height:28px;border:2px solid var(--acc);color:var(--acc);
  display:flex;align-items:center;justify-content:center;font-weight:700;
  font-family:ui-monospace,Consolas,monospace;font-size:11px;letter-spacing:-.5px;}
#projName{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  padding:5px 9px;border-radius:3px;width:230px;font-family:ui-monospace,Consolas,monospace;}
#projName:focus{outline:none;border-color:var(--acc);}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  padding:5px 11px;border-radius:3px;cursor:pointer;font-size:13px;white-space:nowrap;}
.btn:hover{border-color:var(--acc);color:#fff;}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#1b1e23;font-weight:600;}
.btn.primary:hover{background:var(--acc2);}
.btn:disabled{opacity:.4;cursor:default;}
.btn:disabled:hover{border-color:var(--line);color:var(--txt);}
.sep{width:1px;height:24px;background:var(--line);margin:0 2px;}
.spacer{flex:1;}
/* ---------- tool rail ---------- */
.rail{grid-area:rail;background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:4px;}
.tool{width:34px;height:34px;border:1px solid transparent;border-radius:4px;background:none;
  color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tool:hover{color:#fff;background:var(--panel2);}
.tool.on{color:var(--acc);border-color:var(--acc);background:var(--panel2);}
.tool svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.7;}
/* ---------- canvas ---------- */
.canvasWrap{grid-area:canvas;position:relative;overflow:hidden;background:var(--canvas);}
#cv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
#cv.t-select{cursor:default;} #cv.t-pan{cursor:grab;} #cv.panning{cursor:grabbing;}
#cv.t-rect,#cv.t-ellipse,#cv.t-line,#cv.t-arrow{cursor:crosshair;}
#cv.t-text{cursor:text;}
#txtEd{position:absolute;display:none;background:#fff;border:1.5px solid var(--sel);
  font-family:Arial,sans-serif;resize:none;overflow:hidden;padding:2px 4px;line-height:1.25;
  box-shadow:0 2px 10px rgba(0,0,0,.25);z-index:20;}
/* ---------- side panel ---------- */
.side{grid-area:side;background:var(--panel);border-left:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0;}
.tabbar{display:flex;border-bottom:1px solid var(--line);}
.tab{flex:1;padding:8px 0;text-align:center;cursor:pointer;color:var(--txt2);
  font-size:12.5px;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.tabBody{flex:1;overflow-y:auto;padding:10px;display:none;min-height:0;}
.tabBody.on{display:block;}
.grp{margin-bottom:14px;}
/* czytelniejsze rozdzielenie sekcji we Właściwościach */
#tab-props .grp{padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--line);}
#tab-props .grp:last-child{border-bottom:none;padding-bottom:0;}
#tab-props .grp h4{color:var(--acc);}
#tab-props .row{margin-bottom:8px;}
.grp h4{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2);
  margin-bottom:7px;font-weight:600;}
.row{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.row label{font-size:12px;color:var(--txt2);min-width:58px;}
.in{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  padding:4px 6px;border-radius:3px;font-size:12.5px;width:64px;
  font-family:ui-monospace,Consolas,monospace;}
.in:focus{outline:none;border-color:var(--acc);}
.in.wide{width:100%;} select.in{width:auto;font-family:inherit;}
input[type=color].in{padding:1px;width:34px;height:26px;cursor:pointer;}
input[type=checkbox]{accent-color:var(--acc);}
.miniBtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  width:30px;height:28px;border-radius:3px;cursor:pointer;display:inline-flex;
  align-items:center;justify-content:center;}
.miniBtn:hover{border-color:var(--acc);color:#fff;}
.miniBtn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;}
.hint{font-size:11.5px;color:var(--txt2);line-height:1.45;}
.empty{color:var(--txt2);font-size:12.5px;text-align:center;padding:24px 8px;line-height:1.5;}
/* library */
.libItem{border:1px solid var(--line);border-radius:4px;margin-bottom:8px;background:var(--panel2);overflow:hidden;}
.libThumb{background:#fff;height:64px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.libThumb svg{width:92%;height:56px;}
.libRow{display:flex;align-items:center;padding:4px 6px;gap:4px;}
.libRow span{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* biblioteka: kafelki auto-dopasowane do szerokości + foldery */
.libGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;margin-bottom:12px;}
.libTile{border:1px solid var(--line);border-radius:5px;background:var(--panel2);overflow:hidden;display:flex;flex-direction:column;}
.libTile .libThumb{height:56px;}.libTile .libThumb svg{height:48px;}
.libTile .cap{font-size:11px;color:var(--txt);padding:3px 4px 0;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.libTile .tileBar{display:flex;gap:2px;padding:2px 3px 3px;align-items:center;}
.libTile select{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:10px;border-radius:3px;padding:1px;min-width:0;}
.libTile .miniBtn{width:22px;height:22px;min-width:22px;padding:0;}
.libFolderHead{display:flex;align-items:center;gap:6px;margin:10px 0 4px;font-size:11px;text-transform:uppercase;
  letter-spacing:.6px;color:var(--acc);font-weight:600;}
.libFolderHead{cursor:pointer;}
.libFolderHead .fdel{margin-left:auto;background:none;border:none;color:var(--txt2);cursor:pointer;font-size:12px;}
.libFolderHead .fdel:hover{color:#ff5555;}
.libDrop{border:1px dashed transparent;border-radius:5px;padding:2px;margin-bottom:6px;}
.libDrop.dropOn{border-color:var(--acc);background:rgba(255,176,32,.08);}
.libTile{cursor:grab;}
.libTile .grab{color:var(--txt2);font-size:13px;cursor:grab;padding:0 2px;user-select:none;}
/* variants */
#varTbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px;}
#varTbl th,#varTbl td{border:1px solid var(--line);padding:0;}
#varTbl th{background:var(--panel2);padding:4px;font-weight:600;position:relative;}
#varTbl input{width:100%;background:none;border:none;color:var(--txt);padding:4px;font-size:12px;font-family:ui-monospace,monospace;}
#varTbl input:focus{outline:1px solid var(--acc);background:var(--panel2);}
.delX{position:absolute;top:1px;right:1px;background:none;border:none;color:var(--txt2);cursor:pointer;font-size:10px;padding:1px 3px;}
.delX:hover{color:#ff5555;}
/* status bar */
.status{grid-area:status;display:flex;align-items:center;gap:14px;padding:0 12px;
  background:var(--panel);border-top:1px solid var(--line);font-size:12px;color:var(--txt2);}
.status label{display:flex;align-items:center;gap:5px;cursor:pointer;}
.status .in{width:46px;padding:2px 4px;}
/* modal */
.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
  align-items:center;justify-content:center;z-index:50;}
.modalBg.on{display:flex;}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:6px;
  width:640px;max-width:92vw;max-height:84vh;display:flex;flex-direction:column;}
.modal h3{padding:12px 16px;border-bottom:1px solid var(--line);font-size:14px;}
.modalBody{padding:14px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.xlImg{border:1px solid var(--line);border-radius:4px;background:#fff;cursor:pointer;
  padding:4px;display:flex;flex-direction:column;gap:4px;}
.xlImg:hover{border-color:var(--acc);}
.xlImg img{width:100%;height:100px;object-fit:contain;}
.xlImg div{font-size:10.5px;color:var(--txt2);text-align:center;overflow:hidden;text-overflow:ellipsis;}
.xlSel{display:flex;align-items:center;gap:6px;padding:2px 2px 0;}
.xlSel label{font-size:11px;color:#20242b;display:flex;align-items:center;gap:4px;cursor:pointer;}
.xlSel input{accent-color:var(--acc);}
.xlShapePrev{width:100%;height:100px;display:flex;align-items:center;justify-content:center;background:#fff;}
.xlShapePrev svg{width:96%;height:92px;}
.modalFoot{padding:10px 16px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}
/* toast */
#toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:8px 18px;border-radius:4px;font-size:13px;
  opacity:0;transition:opacity .5s;pointer-events:none;z-index:60;border:1px solid var(--acc);
  max-width:70vw;text-align:center;word-break:break-all;}
#toast.on{opacity:1;}
::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px;}
/* ---------- dropdown menus ---------- */
.menu{position:relative;}
.menu>.btn{display:flex;align-items:center;gap:5px;}
.menu>.btn .caret{font-size:9px;opacity:.7;}
.menuPop{position:absolute;top:calc(100% + 4px);left:0;min-width:190px;background:var(--panel2);
  border:1px solid var(--line);border-radius:5px;box-shadow:0 6px 20px rgba(0,0,0,.4);
  padding:4px;z-index:70;display:none;flex-direction:column;gap:1px;}
.menu.open .menuPop{display:flex;}
.menuItem{background:none;border:none;color:var(--txt);text-align:left;padding:7px 10px;border-radius:3px;
  cursor:pointer;font-size:13px;white-space:nowrap;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.menuItem:hover{background:var(--acc);color:#1b1e23;}
.menuItem .sc{font-size:11px;opacity:.6;font-family:ui-monospace,monospace;}
.menuItem:hover .sc{opacity:.85;}
.menuSep{height:1px;background:var(--line);margin:4px 2px;}
/* ---------- resizable side panel ---------- */
body{grid-template-columns:46px 1fr var(--sideW,272px);}
.sideResizer{grid-area:side;justify-self:start;width:6px;margin-left:-3px;cursor:ew-resize;z-index:5;
  background:transparent;position:relative;}
.sideResizer:hover{background:var(--acc);opacity:.5;}
/* ---------- pasek kart projektów ---------- */
.tabsbar{grid-area:tabs;display:flex;align-items:stretch;gap:2px;padding:0 6px;
  background:var(--panel2);border-bottom:1px solid var(--line);overflow-x:auto;overflow-y:hidden;}
.ptab{display:flex;align-items:center;gap:6px;padding:0 4px 0 10px;
  background:var(--panel);border:1px solid var(--line);border-bottom:none;
  border-radius:4px 4px 0 0;margin-top:4px;color:var(--txt2);cursor:pointer;
  font-size:12.5px;white-space:nowrap;}
.ptab:hover{color:var(--txt);}
.ptab.active{color:var(--acc);border-color:var(--acc);background:var(--bg);}
.ptab .ptab-name{overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.ptab .ptab-x{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:13px;
  line-height:1;padding:2px 4px;border-radius:3px;}
.ptab .ptab-x:hover{color:#ff5555;background:var(--panel2);}
.ptab-add{align-self:center;margin:4px 2px 0;background:var(--panel);border:1px solid var(--line);
  color:var(--txt);width:26px;height:24px;border-radius:4px;cursor:pointer;font-size:15px;line-height:1;}
.ptab-add:hover{border-color:var(--acc);color:#fff;}
/* ---------- panel "otwórz zapisany projekt" ---------- */
.ptab-panel{position:fixed;display:none;background:var(--panel2);border:1px solid var(--line);
  border-radius:5px;min-width:220px;max-width:320px;max-height:60vh;overflow-y:auto;
  box-shadow:0 4px 16px rgba(0,0,0,.35);z-index:45;padding:4px;}
.ptab-panel.on{display:block;}
.ptab-panel-empty{color:var(--txt2);font-size:12px;padding:10px;text-align:center;}
.ptab-panel-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:4px;cursor:pointer;}
.ptab-panel-row:hover{background:var(--panel);}
.ptab-panel-name{flex:1;font-size:12.5px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ptab-panel-del{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:3px;}
.ptab-panel-del:hover{color:#ff5555;background:var(--panel2);}
/* ---------- settings tab ---------- */
.setRow{margin-bottom:12px;}
.setRow label.big{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;}
/* ---------- template picker ---------- */
.tmplCard{border:1px solid var(--line);border-radius:5px;background:#fff;cursor:pointer;
  padding:6px;display:flex;flex-direction:column;gap:5px;position:relative;}
.tmplCard:hover{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc);}
.tmplCard svg{width:100%;height:110px;}
.tmplCard .cap{font-size:11.5px;color:#333;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tmplCard .tdel{position:absolute;top:3px;right:3px;background:rgba(255,255,255,.85);border:1px solid var(--line);
  color:#c00;border-radius:3px;cursor:pointer;font-size:11px;line-height:1;padding:2px 5px;}
.tmplCard.blank svg{background:#f6f7f9;}
/* w Electron natywne menu (File/Edit/View) zastępuje te przyciski */
body.desktop-mode #mFile,
body.desktop-mode #mExport { display: none; }
/* ---------- kreator kadru roboczego po imporcie XLSX ---------- */
.xlsxCropBar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:15;
  display:none;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--acc);
  border-radius:6px;padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.35);font-size:12.5px;color:var(--txt);
  max-width:92%;flex-wrap:wrap;}
.xlsxCropBar.on{display:flex;}
.xlsxCropBar label{display:flex;align-items:center;gap:5px;white-space:nowrap;cursor:pointer;}

</style>
</head>
<body>

<!-- ======= TOP BAR ======= -->
<div class="tb">
  <div class="logo">PR</div>
  <input id="projName" value="Instrukcja_01" spellcheck="false" data-i18n-title="tt.projName">
  <div class="sep"></div>

  <div class="menu" id="mFile">
    <button class="btn" data-menu><span data-i18n="menu.file">Plik</span><span class="caret">▼</span></button>
    <div class="menuPop">
      <button class="menuItem" id="bNew"><span data-i18n="file.new">Nowy…</span></button>
      <button class="menuItem" id="bOpen"><span data-i18n="file.open">Otwórz…</span><span class="sc">Ctrl+O</span></button>
      <button class="menuItem" id="bSave"><span data-i18n="file.save">Zapisz projekt</span><span class="sc">Ctrl+S</span></button>
      <button class="menuItem" id="bSaveAs"><span data-i18n="file.saveAs">Zapisz jako…</span></button>
      <div class="menuSep"></div>
      <button class="menuItem" id="bXlsx"><span data-i18n="file.importXlsx">Import XLSX/XLSM</span></button>
      <button class="menuItem" id="bImg"><span data-i18n="file.insertImg">Wstaw obraz…</span></button>
    </div>
  </div>

  <div class="menu" id="mExport">
    <button class="btn" data-menu><span data-i18n="menu.export">Eksport</span><span class="caret">▼</span></button>
    <div class="menuPop">
      <button class="menuItem" id="bPng"><span data-i18n="export.png">Eksportuj PNG</span></button>
      <button class="menuItem" id="bPngAs"><span data-i18n="export.pngAs">Eksportuj PNG jako…</span></button>
      <div class="menuSep"></div>
      <button class="menuItem" id="bJpg"><span data-i18n="export.jpg">Eksportuj JPG</span></button>
      <button class="menuItem" id="bJpgAs"><span data-i18n="export.jpgAs">Eksportuj JPG jako…</span></button>
    </div>
  </div>

  <div class="sep"></div>
  <button class="btn primary" id="bJpgQuick" data-i18n="export.jpgQuick">Eksport JPG</button>
  <div class="spacer"></div>
  <button class="btn" id="bUndo" data-i18n-title="tt.undo">&#x21B6;</button>
  <button class="btn" id="bRedo" data-i18n-title="tt.redo">&#x21B7;</button>
</div>

<!-- ======= PROJECT TABS ======= -->
<div class="tabsbar" id="tabsBar"></div>

<!-- ======= TOOL RAIL ======= -->
<div class="rail">
  <button class="tool on" data-tool="select" data-i18n-title="tt.tool.select"><svg viewBox="0 0 24 24"><path d="M6 3l12 9-6 1 3 7-3 1-3-7-4 4z"/></svg></button>
  <button class="tool" data-tool="rect" data-i18n-title="tt.tool.rect"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12"/></svg></button>
  <button class="tool" data-tool="ellipse" data-i18n-title="tt.tool.ellipse"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></button>
  <button class="tool" data-tool="line" data-i18n-title="tt.tool.line"><svg viewBox="0 0 24 24"><path d="M4 20L20 4"/></svg></button>
  <button class="tool" data-tool="arrow" data-i18n-title="tt.tool.arrow"><svg viewBox="0 0 24 24"><path d="M4 20L18 6M18 6h-6M18 6v6"/></svg></button>
  <button class="tool" data-tool="text" data-i18n-title="tt.tool.text"><svg viewBox="0 0 24 24"><path d="M5 6h14M12 6v13"/></svg></button>
  <button class="tool" data-tool="shapes" data-i18n-title="tt.tool.shapes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><polygon points="12,3 22,21 2,21"/></svg></button>
  <button class="tool" data-tool="image" data-i18n-title="tt.tool.image"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14"/><path d="M4 15l5-5 4 4 3-3 4 4"/><circle cx="9" cy="9" r="1.4"/></svg></button>
</div>

<!-- ======= CANVAS ======= -->
<div class="canvasWrap" id="cwrap">
  <svg id="cv" class="t-select"></svg>
  <textarea id="txtEd" spellcheck="false"></textarea>
  <div class="xlsxCropBar" id="xlsxCropBar">
    <span data-i18n="xlsxcrop.hint">Przeciągnij na kanwie, aby zaznaczyć obszar roboczy arkusza.</span>
    <label><input type="checkbox" id="xlsxCropRemoveOutside"> <span data-i18n="xlsxcrop.removeOutside">Usuń kształty poza obszarem</span></label>
    <button class="btn" id="xlsxCropCancel" data-i18n="btn.cancel">Anuluj</button>
    <button class="btn primary" id="xlsxCropConfirm" data-i18n="xlsxcrop.confirm">Zatwierdź</button>
  </div>
</div>

<!-- ======= SIDE PANEL ======= -->
<div class="sideResizer" id="sideResizer" title="Przeciągnij, aby zmienić szerokość"></div>
<div class="side">
  <div class="tabbar">
    <button class="tab on" data-tab="props" data-i18n="tab.props">Właściwości</button>
    <button class="tab" data-tab="lib" data-i18n="tab.lib">Biblioteka</button>
    <button class="tab" data-tab="vars" data-i18n="tab.vars">Warianty</button>
    <button class="tab" data-tab="settings" data-i18n="tab.settings">Ustawienia</button>
    <button class="tab" data-tab="help" data-i18n="tab.help">Pomoc</button>
  </div>
  <div class="tabBody on" id="tab-props"></div>
  <div class="tabBody" id="tab-lib"></div>
  <div class="tabBody" id="tab-vars"></div>
  <div class="tabBody" id="tab-settings"></div>
  <div class="tabBody" id="tab-help"></div>
</div>

<!-- ======= STATUS ======= -->
<div class="status">
  <label><span data-i18n="status.format">Format</span> <select class="in" id="pageSel" style="width:118px">
    <option value="a4l" data-i18n="page.a4l">A4 poziomo</option>
    <option value="a4p" data-i18n="page.a4p">A4 pionowo</option>
    <option value="hd">1600×900</option>
    <option value="custom" data-i18n="page.custom">Własny</option>
    <option value="off" data-i18n="page.off">∞ nieskończony</option>

<!-- ======= SCRIPTS (classic, shared global scope — order matters) ======= -->
<script>
"use strict";
/* =====================================================================
   ProdRys — jednoplikowy edytor wektorowy do instrukcji produkcyjnych
   ===================================================================== */
const $ = q => document.querySelector(q);
const $$ = q => [...document.querySelectorAll(q)];
const cv = $('#cv'), cwrap = $('#cwrap'), txtEd = $('#txtEd');

/* ---------- stan ---------- */
let state = {
  name: 'Instrukcja_01',
  shapes: [],                    // kolejność = z-order (0 = spód)
  vars: { cols: [], rows: [] },  // warianty
  page: { mode: 'a4l', w: 1123, h: 794 }, // format kanwy; mode 'off' = nieskończona
};
const PAGES = {
  a4l: { w: 1123, h: 794 }, a4p: { w: 794, h: 1123 },
  hd: { w: 1600, h: 900 }, custom: {}, off: {}
};
let view = { x: 60, y: 60, z: 1 };
let sel = new Set();
let tool = 'select';
let lib = [];                    // biblioteka grup
let guides = [];                 // linie pomocnicze przyciągania
let previewRow = -1;             // -1 = brak podglądu wariantu
let clip = null;                 // wewnętrzny schowek kształtów
let spaceDown = false;
let matrixGap = 0;          // odstęp w układzie macierzowym
let rotStepOn = true;       // skokowe obracanie (co ROT_STEP°) — domyślnie włączone
let libFolders = [];        // nazwy folderów biblioteki (do segregacji)
let cropMode = null;        // id obrazka w trybie przycinania
let xlsxCropActive = false; // kreator kadru roboczego po imporcie XLSX (patrz js/15-xlsx.js)
let xlsxCropBox = null;     // {x,y,w,h} aktualnie rysowany/dostosowywany obszar kadru
let libCollapsed = {};      // zwinięte foldery biblioteki {nazwa:true}
const ROT_STEP = 10;        // krok skokowego obrotu
let currentProjectHandle = null;  // uchwyt pliku (zapis w miejscu, File System Access API)

/* ---------- ustawienia aplikacji + szablony ---------- */
let settings = { lang: 'pl', mxMaster: false, zoomDiv: 4, sideW: 272, autosave: true, infiniteCanvasMargin: 16,
  defaults: { font: 'Calibri', fs: 14, sw: 2, stroke: '#000000', fill: '#ffffff', tc: '#000000' } };
let templates = [];         // [{name, shapes, vars, page}]
let imgCascade = 0;         // przesunięcie kolejnych wstawianych obrazów


"use strict";
/* =====================================================================
   Projekty — rejestr wielu projektów + gniazda autozapisu (multi-tab).
   Każdy projekt = gniazdo (slot) o unikalnym, rosnącym id (id wewnętrzne,
   nigdzie nie pokazywane użytkownikowi — nazwy widoczne w kartach bierze
   się z rejestru).

   Dane projektu : localStorage['prodrys_auto:<slot>']  (JSON jak projectJSON())
   Rejestr WSZYSTKICH projektów (otwartych i zamkniętych):
                   localStorage['prodrys_projects'] = [{slot,name}, ...]
   Otwarte karty  : localStorage['prodrys_session'] = {open:[slot,...], active:slot}
                   (trwałe — przetrwa pełne zamknięcie i ponowne otwarcie apki/okna)
   Żywe gniazda   : localStorage['prodrys_live'] = {slot: ts}  (ten sam projekt
                   otwarty *teraz* w innym oknie — zabezpieczenie przed
                   nadpisaniem się dwóch okien edytujących to samo gniazdo)

   Zamknięcie karty (×) NIE usuwa projektu — tylko chowa go z paska kart.
   Każdy zamknięty projekt można później otworzyć z panelu „Otwórz zapisany
   projekt" albo trwale usunąć (js/tabs.js).

   Autozapis można wyłączyć w Ustawieniach (settings.autosave) — wtedy
   zmiany w bieżącej karcie nie są zapisywane (przełączenie/zamknięcie
   karty lub programu je odrzuca). Sam fakt, które karty są otwarte, i tak
   jest zapisywany trwale, niezależnie od tego przełącznika.

   Funkcje logiki są tylko DEFINIOWANE tutaj; PS_init() woła 21-init.js po
   załadowaniu wszystkich modułów (render/state/itd. muszą już istnieć).
   Warstwa UI paska kart (Tabs_render / Tabs_new) jest w js/tabs.js.
   ===================================================================== */

const PS_REG_KEY  = 'prodrys_projects';
const PS_LIVE_KEY = 'prodrys_live';
const PS_SESS_KEY = 'prodrys_session';   // localStorage — trwałe, przetrwa restart apki
const PS_STALE_MS = 6000;
const PS_HEARTBEAT_MS = 2000;

let PS_active = 0;                          // aktywny slot tego okna

/* ---------- rejestr WSZYSTKICH projektów ---------- */
function PS_registry() {
  try { const r = JSON.parse(localStorage.getItem(PS_REG_KEY)); return Array.isArray(r) ? r : []; }
  catch (e) { return []; }
}
function PS_saveRegistry(list) { try { localStorage.setItem(PS_REG_KEY, JSON.stringify(list)); } catch (e) {} }
function PS_keyFor(slot) { return 'prodrys_auto:' + slot; }
function PS_projectName(slot) { const p = PS_registry().find(x => x.slot === slot); return p ? p.name : ('Projekt ' + slot); }
function PS_nextSlot() { let m = 0; for (const p of PS_registry()) if (p.slot > m) m = p.slot; return m + 1; }
/* numer w domyślnej nazwie ("Instrukcja_03") liczony z liczby projektów w
   rejestrze — nie z wewnętrznego id gniazda, żeby nie pokazywać rosnącego
   w nieskończoność licznika po usunięciu starych projektów */
function PS_nextDisplayNumber() { return PS_registry().length + 1; }

/* ---------- dane projektu ---------- */
function PS_readData(slot) { try { return localStorage.getItem(PS_keyFor(slot)); } catch (e) { return null; } }
function PS_writeData(slot, json) { try { localStorage.setItem(PS_keyFor(slot), json); } catch (e) {} }
function PS_autosaveOn() { return settings.autosave !== false; }

/* ---------- „żywe" gniazda (ten sam projekt otwarty w innym oknie) ---------- */
function PS_readLive() {
  try { const l = JSON.parse(localStorage.getItem(PS_LIVE_KEY)); return (l && typeof l === 'object') ? l : {}; }
  catch (e) { return {}; }
}
function PS_writeLive(o) { try { localStorage.setItem(PS_LIVE_KEY, JSON.stringify(o)); } catch (e) {} }
function PS_isLiveElsewhere(slot) {
  const ts = PS_readLive()[slot];
  return ts !== undefined && (Date.now() - ts) < PS_STALE_MS && !PS_openSlots().includes(slot);
}

/* ---------- karty tego okna — trwała sesja (localStorage) ---------- */
function PS_session() {
  try {
    const s = JSON.parse(localStorage.getItem(PS_SESS_KEY));
    return (s && Array.isArray(s.open)) ? s : { open: [], active: 0 };
  } catch (e) { return { open: [], active: 0 }; }
}
function PS_openSlots() { return PS_session().open; }
function PS_setOpen(list, active) {
  try { localStorage.setItem(PS_SESS_KEY, JSON.stringify({ open: list, active: (active !== undefined ? active : PS_active) })); }
  catch (e) {}
}
function PS_activeSlot() { return PS_active; }
function PS_autoKey() { return PS_keyFor(PS_active); }   // używane przez autosave()

/* ---------- serializacja ---------- */
function PS_currentJSON() { return (typeof projectJSON === 'function') ? projectJSON() : JSON.stringify(state); }
function PS_defaultProjectJSON(name) {
  const W = PAGES.a4l.w, H = PAGES.a4l.h;
  const shapes = (typeof templateShapes === 'function') ? templateShapes(W, H) : [];
  return JSON.stringify({ app: 'prodrys', version: 2, name: name,
    shapes: shapes, vars: { cols: [], rows: [] }, page: { mode: 'a4l', w: W, h: H },
    lib: (typeof lib !== 'undefined' ? lib : []) }, null, 1);
}

/* ---------- tworzenie / zapis / wczytanie ---------- */
/* utworzenie projektu zawsze zapisuje jego początkową treść — to jest
   jednorazowe "stworzenie", nie "autozapis", więc nie podlega przełącznikowi */
function PS_newProject(name) {
  const slot = PS_nextSlot();
  name = name || ('Instrukcja_' + String(PS_nextDisplayNumber()).padStart(2, '0'));
  const reg = PS_registry(); reg.push({ slot: slot, name: name }); PS_saveRegistry(reg);
  PS_writeData(slot, PS_defaultProjectJSON(name));
  return { slot: slot, name: name };
}
function PS_commitActive() { if (PS_active && PS_autosaveOn()) PS_writeData(PS_active, PS_currentJSON()); }

/* wczytaj dane gniazda do żywego stanu (state) i przerysuj */
function PS_loadInto(slot) {
  let obj = null;
  try { const raw = PS_readData(slot); obj = raw ? JSON.parse(raw) : null; } catch (e) { obj = null; }
  if (!obj || !Array.isArray(obj.shapes)) obj = JSON.parse(PS_defaultProjectJSON(PS_projectName(slot)));
  currentProjectHandle = null;
  state = {
    name: obj.name || PS_projectName(slot),
    shapes: obj.shapes.map(normalizeShape),
    vars: (obj.vars && obj.vars.cols) ? obj.vars : { cols: [], rows: [] },
    page: (obj.page && obj.page.mode) ? obj.page : { mode: 'off' }
  };
  if ($('#projName')) $('#projName').value = state.name;
  sel.clear(); previewRow = -1; clearHistory();
  syncPageUI(); fitPage(); render(); renderProps(); renderVars();
}

/* przełącz aktywną kartę na istniejące, otwarte gniazdo */
function PS_switchTo(slot) {
  if (slot === PS_active) return;
  PS_commitActive();
  PS_active = slot;
  const open = PS_openSlots(); if (!open.includes(slot)) open.push(slot);
  PS_setOpen(open, slot);
  PS_loadInto(slot);
  PS_heartbeat();
  if (typeof Tabs_render === 'function') Tabs_render();
}

/* nowa karta z szablonu (null=pusty, 'builtin'=wbudowany, obj=szablon) */
function PS_openNewTabFromTemplate(tmpl) {
  PS_commitActive();
  const slot = PS_nextSlot();
  const name = 'Instrukcja_' + String(PS_nextDisplayNumber()).padStart(2, '0');
  const reg = PS_registry(); reg.push({ slot: slot, name: name }); PS_saveRegistry(reg);
  const open = PS_openSlots(); open.push(slot);
  PS_active = slot; PS_setOpen(open, slot);
  projectFromTemplate(tmpl);                 // ustawia świeży state + autosave() -> PS_autoKey()=slot
  state.name = name; if ($('#projName')) $('#projName').value = name;
  PS_writeData(slot, PS_currentJSON());       // pierwszy zapis — jak przy tworzeniu, nie podlega przełącznikowi
  PS_heartbeat();
  if (typeof Tabs_render === 'function') Tabs_render();
}

/* otwórz jako nową kartę projekt, który już istnieje w rejestrze, ale nie
   jest otwarty w tym oknie (np. wcześniej zamknięty) */
function PS_reopenProject(slot) {
  if (PS_openSlots().includes(slot)) { PS_switchTo(slot); return; }
  if (PS_isLiveElsewhere(slot)) {
    if (typeof toast === 'function') toast(t('t.projLiveElsewhere'));
    return;
  }
  PS_commitActive();
  const open = PS_openSlots(); open.push(slot);
  PS_active = slot; PS_setOpen(open, PS_active);
  PS_loadInto(slot);
  PS_heartbeat();
  if (typeof Tabs_render === 'function') Tabs_render();
}

/* projekty w rejestrze, które NIE są otwarte jako karta w tym oknie —
   lista do panelu "otwórz zapisany projekt" */
function PS_closedProjects() {
  const open = PS_openSlots();
  return PS_registry().filter(p => !open.includes(p.slot));
}

/* zmiana nazwy aktywnego projektu (spięte z polem #projName) */
function PS_renameActive(name) {
  if (!PS_active) return;
  const reg = PS_registry(); const p = reg.find(x => x.slot === PS_active);
  if (p) { p.name = name; PS_saveRegistry(reg); }
  if (typeof Tabs_render === 'function') Tabs_render();
}

/* zamknij kartę — projekt ZOSTAJE w rejestrze i w danych, tylko chowa się
   z paska; można go później otworzyć z panelu "otwórz zapisany projekt" */
function PS_closeTab(slot) {
  PS_commitActive();
  let open = PS_openSlots().filter(s => s !== slot);
  if (!open.length) { const np = PS_newProject(); open = [np.slot]; }   // okno nigdy bez karty
  const l = PS_readLive(); delete l[slot]; PS_writeLive(l);
  const newActive = (slot === PS_active) ? open[open.length - 1] : PS_active;
  PS_setOpen(open, newActive);
  if (slot === PS_active) { PS_active = newActive; PS_loadInto(newActive); }
  if (typeof Tabs_render === 'function') Tabs_render();
}

/* usuń projekt NA ZAWSZE — z rejestru, z danych, z karty (jeśli otwarty).
   Nieodwracalne; wywołujący (UI) powinien wcześniej potwierdzić z użytkownikiem. */
function PS_deleteProject(slot) {
  let open = PS_openSlots();
  if (open.includes(slot)) {
    open = open.filter(s => s !== slot);
    if (!open.length) { const np = PS_newProject(); open = [np.slot]; }
    const newActive = (slot === PS_active) ? open[open.length - 1] : PS_active;
    PS_setOpen(open, newActive);
    if (slot === PS_active) { PS_active = newActive; PS_loadInto(newActive); }
  }
  PS_saveRegistry(PS_registry().filter(p => p.slot !== slot));
  try { localStorage.removeItem(PS_keyFor(slot)); } catch (e) {}
  const l = PS_readLive(); delete l[slot]; PS_writeLive(l);
  if (typeof Tabs_render === 'function') Tabs_render();
}

/* ---------- heartbeat wszystkich otwartych gniazd tego okna ---------- */
function PS_heartbeat() { const l = PS_readLive(), now = Date.now(); for (const s of PS_openSlots()) l[s] = now; PS_writeLive(l); }
function PS_releaseAll() { const l = PS_readLive(); for (const s of PS_openSlots()) delete l[s]; PS_writeLive(l); }

/* ---------- migracja starego pojedynczego autozapisu ---------- */
function PS_migrateLegacy() {
  try {
    const legacy = localStorage.getItem('prodrys_auto');
    if (legacy && !PS_registry().length && !localStorage.getItem(PS_keyFor(1))) {
      let name = 'Instrukcja_01';
      try { const o = JSON.parse(legacy); if (o && o.name) name = o.name; } catch (e) {}
      PS_writeData(1, legacy);
      PS_saveRegistry([{ slot: 1, name: name }]);
    }
  } catch (e) {}
}

/* ---------- start (woła 21-init.js) ----------
   Karty otwarte przy poprzednim zamknięciu okna są trwale zapamiętane
   (localStorage), więc po ponownym otwarciu apki/okna wracają WSZYSTKIE —
   nie tylko jedna. Gniazdo aktualnie "żywe" w innym oknie jest pomijane,
   żeby dwa okna nie edytowały tego samego projektu naraz. */
function PS_init() {
  PS_migrateLegacy();
  const regSlots = PS_registry().map(p => p.slot);
  const sess = PS_session();
  let open = sess.open.filter(s => regSlots.includes(s) && !PS_isLiveElsewhere(s));
  if (open.length) {
    PS_active = (sess.active && open.includes(sess.active)) ? sess.active : open[0];
  } else {
    /* brak zapamiętanej sesji (pierwszy start) albo wszystko żywe gdzie indziej:
       otwórz projekt NIE otwarty w innym oknie, albo utwórz nowy */
    let pick = null;
    for (const p of PS_registry()) { if (!PS_isLiveElsewhere(p.slot)) { pick = p.slot; break; } }
    if (pick === null) pick = PS_newProject().slot;
    open = [pick]; PS_active = pick;
  }
  PS_setOpen(open, PS_active);
  PS_loadInto(PS_active);
  PS_heartbeat();
  setInterval(PS_heartbeat, PS_HEARTBEAT_MS);
  window.addEventListener('beforeunload', function () { PS_commitActive(); PS_releaseAll(); });
  if (typeof Tabs_render === 'function') Tabs_render();
}

/* ---------- wyrównanie / rozkład ---------- */
function moveShapeTo(s, nx, ny) {
  const b = aabbOf(s);
  const dx = nx - b.x, dy = ny - b.y;
  if (s.type === 'line') { s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy; }
  else { s.x += dx; s.y += dy; }
}
function alignSel(kind) {
  const ss = selShapes();
  if (kind === 'dh' || kind === 'dv') return distribute(kind);
  if (ss.length < 2) return toast(t('t.min2'));
  if (hasMoveLock(ss)) return lockToast();
  pushUndo();
  const U = unionBBox(ss);
  for (const s of ss) {
    const b = aabbOf(s);
    if (kind === 'l') moveShapeTo(s, U.x, b.y);
    if (kind === 'r') moveShapeTo(s, U.x + U.w - b.w, b.y);
    if (kind === 'cx') moveShapeTo(s, U.x + (U.w - b.w) / 2, b.y);
    if (kind === 't') moveShapeTo(s, b.x, U.y);
    if (kind === 'b') moveShapeTo(s, b.x, U.y + U.h - b.h);
    if (kind === 'cy') moveShapeTo(s, b.x, U.y + (U.h - b.h) / 2);
  }
  render(); autosave();
}
function distribute(kind) {
  const ss = selShapes();
  if (ss.length < 3) return toast(t('t.min3'));
  if (hasMoveLock(ss)) return lockToast();
  pushUndo();
  const hor = kind === 'dh';
  const items = ss.map(s => ({ s, b: aabbOf(s) }))
    .sort((a, b) => hor ? a.b.x - b.b.x : a.b.y - b.b.y);
  const first = items[0].b, last = items[items.length - 1].b;
  const span = hor ? (last.x + last.w) - first.x : (last.y + last.h) - first.y;
  const sum = items.reduce((t, i) => t + (hor ? i.b.w : i.b.h), 0);
  const gap = (span - sum) / (items.length - 1);
  let pos = hor ? first.x : first.y;
  for (const it of items) {
    if (hor) { moveShapeTo(it.s, pos, it.b.y); pos += it.b.w + gap; }
    else { moveShapeTo(it.s, it.b.x, pos); pos += it.b.h + gap; }
  }

}
/* ---------- macierz: ułóż zaznaczone kształty w tabelę ---------- */
function gridArrange(resize) {
  const ss = selShapes().filter(s => s.type !== 'line');
  if (ss.length < 2) return toast(t('t.min2mx'));
  if (hasMoveLock(ss)) return lockToast();
  pushUndo();
  const items = ss.map(s => ({ s, b: aabbOf(s) }));
  const hs = items.map(i => i.b.h).sort((a, b) => a - b);
  const medH = hs[hs.length >> 1] || 20;
  /* wiersze wg środka Y (klaster), kolumny wg X */
  items.sort((a, b) => (a.b.y + a.b.h / 2) - (b.b.y + b.b.h / 2));
  const rows = [];
  for (const it of items) {
    const cy = it.b.y + it.b.h / 2;
    const row = rows[rows.length - 1];
    if (!row || cy - row.cy > medH * 0.7) rows.push({ cy, items: [it] });
    else row.items.push(it);
  }
  rows.forEach(r => r.items.sort((a, b) => a.b.x - b.b.x));
  const U = unionBBox(ss);
  const gap = matrixGap;
  if (resize) {
    /* Per-row: uniform height = max height in that row (obrócone pomijamy) */
    for (const row of rows) {
      const rowH = Math.max(...row.items.map(i => i.b.h));
      for (const it of row.items)
        if (it.s.h !== undefined && !it.s.rot) { it.s.h = rowH; it.b = aabbOf(it.s); }
    }
    /* Per-column: uniform width = max width in that column */
    const numColumns = Math.max(...rows.map(r => r.items.length));
    for (let j = 0; j < numColumns; j++) {
      const cw = Math.max(...rows.map(r => r.items[j] ? r.items[j].b.w : 0));
      for (const row of rows)
        if (row.items[j] && row.items[j].s.w !== undefined && !row.items[j].s.rot) {
          row.items[j].s.w = cw; row.items[j].b = aabbOf(row.items[j].s);
        }
    }
  }
  const nCols = Math.max(...rows.map(r => r.items.length));
  const colW = [];
  for (let j = 0; j < nCols; j++)
    colW[j] = Math.max(...rows.map(r => r.items[j] ? r.items[j].b.w : 0));
  let y = U.y;
  for (const r of rows) {
    const rh = Math.max(...r.items.map(i => i.b.h));
    let x = U.x;
    r.items.forEach((it, j) => {
      moveShapeTo(it.s, x, y + (rh - it.b.h) / 2);
      x += colW[j] + gap;
    });
    y += rh + gap;
  }
  render(); renderProps(); autosave();
}
/* ---------- kolejność (z-order) ---------- */
function zOrder(kind) {
  pushUndo();
  const selected = state.shapes.filter(s => sel.has(s.id));
  const rest = state.shapes.filter(s => !sel.has(s.id));
  if (kind === 'top') state.shapes = [...rest, ...selected];
  else if (kind === 'bot') state.shapes = [...selected, ...rest];
  else {
    const arr = state.shapes;
    const idxs = arr.map((s, i) => sel.has(s.id) ? i : -1).filter(i => i >= 0);
    if (kind === 'up') {
      for (let k = idxs.length - 1; k >= 0; k--) {
        const i = idxs[k];
        if (i < arr.length - 1 && !sel.has(arr[i + 1].id))
          [arr[i], arr[i + 1]] = [arr[i + 1], arr[i]];
      }
    } else {
      for (const i of idxs)
        if (i > 0 && !sel.has(arr[i - 1].id))
          [arr[i], arr[i - 1]] = [arr[i - 1], arr[i]];
    }
  }
  render(); autosave();
}

/* nazwa wariantu: wzór {A}_{B} albo wartości zmiennych złączone "_" */
function variantName(row) {
  const V = state.vars;
  const pat = (V.namePattern || '').trim();
  if (pat) return sanitizeFile(subst(pat, row.vals)) || sanitizeFile(row.name);
  const vals = V.cols.map(c => row.vals[c] ?? '').filter(x => String(x).trim() !== '');
  return sanitizeFile(vals.length ? vals.join('_') : row.name);
}
async function generateVariants() {
  if (!state.shapes.length) return toast(t('t.emptyCanvas'));
  const proj = stripExt(sanitizeFile($('#projName').value));
  const files = [];
  const used = {};
  const region = pageRegion();
  const pad = (settings.infiniteCanvasMargin != null) ? settings.infiniteCanvasMargin : 16;
  toast(t('t.genVariants'));
  for (const row of state.vars.rows) {
    const b = buildSVG(state.shapes, row.vals, pad, region);
    if (!b) continue;
    const jpg = await svgToPngBlob(b.svg, b.w, b.h, 2, 'image/jpeg');   /* JPG zamiast PNG — mniejsze pliki przy masowym eksporcie */
    let nm = variantName(row);
    if (used[nm]) nm += '_' + (++used[nm]); else used[nm] = 1;   /* unikaj kolizji nazw */
    files.push({ name: proj + '_' + nm + '.jpg', data: new Uint8Array(await jpg.arrayBuffer()) });
  }
  if (!files.length) return toast(t('t.noVariants'));
  downloadBlob(makeZip(files), proj + '_warianty.zip');
  toast(t('t.genDone', { n: files.length }));
}

/* File System Access API — zapis w miejscu (do tego samego pliku), bez pobierania */
function hasNativeFS() {
  return typeof window.showSaveFilePicker === 'function' && typeof window.showOpenFilePicker === 'function';
}
function projectFileTypes() {
  return [{ description: 'ProdDraw Project', accept: { 'application/json': ['.pdraw', '.json', '.prodrys'] } }];
}
async function writeToHandle(handle) {
  const w = await handle.createWritable();
  await w.write(projectJSON());

}
function setNameFromFilename(fn) {

async function saveProject(forcePicker = false) {
  state.name = $('#projName').value;

  if (hasNativeFS()) {
    try {
      if (!currentProjectHandle || forcePicker) {
        currentProjectHandle = await window.showSaveFilePicker({ suggestedName: name + '.pdraw', types: projectFileTypes() });
      }

      toast(t('t.nativeSaved') + fn, 6000); autosave();

    } catch (err) {
      if (err && err.name === 'AbortError') return;   /* użytkownik anulował */
      toast(t('t.saveErr'));
    }
  }
  /* fallback: pobranie pliku */
  downloadBlob(new Blob([projectJSON()], { type: 'application/json' }), name + '.json');
  toast(t('t.saved') + name + '.json', 6000);
}
async function saveProjectAs() {
  if (!hasNativeFS()) {
    const n = ((await promptDialog(t('p.saveAs'), $('#projName').value)) || '').trim();
    if (!n) return;
    $('#projName').value = n; state.name = n;
    return saveProject();
  }

}
async function openProjectNative() {
  if (!hasNativeFS()) { $('#fOpen').click(); return; }
  try {
    const [handle] = await window.showOpenFilePicker({ multiple: false, types: projectFileTypes() });
    if (!handle) return;
    const file = await handle.getFile();
    const obj = JSON.parse(await file.text());
    if (obj.app === 'prodrys-config' || obj.app === 'prodrys-settings') { importConfig(obj); return; }
    loadProject(obj, file.name);
    currentProjectHandle = handle;   /* kolejny zapis pójdzie do tego pliku */
  } catch (err) {
    if (err && err.name === 'AbortError') return;
    toast(t('t.openErr'));
  }
}
function loadProject(obj, fileName) {
  if (!obj || !isProjectApp(obj.app) || !Array.isArray(obj.shapes))
    return toast(t('t.badProj'));
  pushUndo();
  /* nazwa projektu = nazwa pliku (bez rozszerzenia), z fallbackiem na pole name */
  const fromFile = fileName ? fileName.replace(/\.[^.]+$/, '') : '';
  state.name = fromFile || obj.name || 'Projekt';
  $('#projName').value = state.name;
  state.shapes = obj.shapes.map(normalizeShape);
  state.vars = obj.vars && obj.vars.cols ? obj.vars : { cols: [], rows: [] };
  state.page = obj.page && obj.page.mode ? obj.page : { mode: 'off' };
  syncPageUI(); fitPage();
  /* scal bibliotekę z projektu (bez duplikatów nazw) */
  if (Array.isArray(obj.lib)) {
    for (const it of obj.lib)
      if (!lib.some(l => l.name === it.name)) lib.push(it);
    saveLib(); renderLib();
  }
  sel.clear(); previewRow = -1;
  render(); renderProps(); renderVars();
  if (typeof PS_renameActive === 'function') PS_renameActive(state.name);
  autosave();
  toast(t('t.loaded') + state.name);
}
let autosaveTm = null;
function autosave() {
  clearTimeout(autosaveTm);
  if (settings.autosave === false) return;   /* wyłączony w Ustawieniach — nic nie zapisuj */
  /* przechwyć KLUCZ gniazda i TREŚĆ od razu, synchronicznie — nie w momencie
     odpalenia timera 400ms. Gdyby czytać PS_autoKey()/projectJSON() dopiero
     w callbacku, przełączenie karty w tym oknie w międzyczasie (PS_active
     wskazuje już na inne gniazdo, state to już inny projekt) nadpisałoby złe
     gniazdo złą, nieaktualną zawartością. Zamrożenie obu wartości TERAZ usuwa
     ten wyścig całkowicie — timer tylko opóźnia zapis, nie odczyt. */
  const key = PS_autoKey();
  const json = projectJSON();
  autosaveTm = setTimeout(() => {
    try { localStorage.setItem(key, json); } catch (e) {}
  }, 400);
}
const exportHandles = { png: null, jpg: null };   /* zapamiętane pliki eksportu (jak zapis) */
async function exportImage(fmt, forcePicker = false) {
  const region = pageRegion();
  if (!state.shapes.length && !region) return toast(t('t.emptyCanvas'));
  /* margines dla kanwy nieskończonej (bez strony) — konfigurowalny w Ustawieniach;
     gdy jest region (strona ma format), pad jest przez buildSVG i tak ignorowany */
  const pad = (settings.infiniteCanvasMargin != null) ? settings.infiniteCanvasMargin : 16;
  const b = buildSVG(state.shapes, currentVals(), pad, region);
  const mime = fmt === 'jpg' ? 'image/jpeg' : 'image/png';
  const ext = fmt === 'jpg' ? '.jpg' : '.png';
  const blob = await svgToPngBlob(b.svg, b.w, b.h, 2, mime);
  let name = stripExt(sanitizeFile($('#projName').value));
  if (previewRow >= 0 && state.vars.rows[previewRow])
    name += '_' + stripExt(sanitizeFile(state.vars.rows[previewRow].name));

      }

"use strict";
function insertImageURL(url) {
  const img = new Image();
  img.onload = () => {
    pushUndo();
    const maxW = 480;
    const k = img.naturalWidth > maxW ? maxW / img.naturalWidth : 1;
    const r = cv.getBoundingClientRect();
    /* kaskada — kolejne obrazy nie nakładają się na siebie */
    const off = (imgCascade % 10) * 28 / view.z;
    imgCascade++;
    const c = { x: (r.width / 2 - view.x) / view.z + off, y: (r.height / 2 - view.y) / view.z + off };
    const s = { id: uid(), type: 'image', href: url,
      x: c.x - img.naturalWidth * k / 2, y: c.y - img.naturalHeight * k / 2,
      w: img.naturalWidth * k, h: img.naturalHeight * k };
    state.shapes.push(s);
    setSelection([s.id]); setTool('select'); autosave();
  };
  img.onerror = () => toast(t('t.imgLoadErr'));
  img.src = url;
}
function fileToDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
/* wklejanie: obraz ze schowka (np. zrzut z CATII) lub skopiowane kształty */
const CLIP_PREFIX = 'PRODDRAW_SHAPES:';
document.addEventListener('paste', async e => {
  if (document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
  /* skopiowane kształty (autorytatywne — nadpisują stary obrazek w schowku) */
  const txt = (e.clipboardData && e.clipboardData.getData('text/plain')) || '';
  if (txt.startsWith(CLIP_PREFIX)) {
    e.preventDefault();
    clip = txt.slice(CLIP_PREFIX.length);
    pasteClip();
    return;
  }
  const items = [...(e.clipboardData?.items || [])];
  const imgItem = items.find(i => i.type.startsWith('image/'));
  if (imgItem) {
    e.preventDefault();
    insertImageURL(await fileToDataURL(imgItem.getAsFile()));
    toast(t('t.pasteImg'));
    return;
  }
  /* obrazy w HTML ze schowka (np. kształty/zakres skopiowane z Excela) */
  const html = e.clipboardData?.getData('text/html');
  if (html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const srcs = [...doc.querySelectorAll('img')].map(im => im.getAttribute('src'))
      .filter(src => src && /^data:image\//.test(src));
    if (srcs.length) {
      e.preventDefault();
      srcs.forEach(src => insertImageURL(src));
      toast(t('t.pasteImg'));
      return;
    }
  }
  if (clip) { e.preventDefault(); pasteClip(); }
});
function copySel() {
  const ss = selShapes(); if (!ss.length) return;
  clip = JSON.stringify(ss);
  /* nadpisz schowek systemowy naszymi kształtami (usuwa stary obrazek) */
  try { if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(CLIP_PREFIX + clip); } catch (e) {}
  toast(t('t.copied') + ss.length);
}
function pasteClip() {
  if (!clip) return;
  pushUndo();
  const gmap = {};
  const copies = JSON.parse(clip).map(s => {
    s.id = uid();
    if (s.g) { gmap[s.g] = gmap[s.g] || ('G' + uid()); s.g = gmap[s.g]; }
    if (s.type === 'line') { s.x1 += 18; s.y1 += 18; s.x2 += 18; s.y2 += 18; }
    else { s.x += 18; s.y += 18; }
    return s;
  });
  state.shapes.push(...copies);
  setSelection(copies.map(c => c.id)); autosave();
}
/* import XLSX/XLSM — tylko osadzone obrazy (bez „śmieciowych" kształtów) */
/* buforowana lista elementów importu XLSX (obrazy + kształty do wyboru) */
let xlsxImportItems = [];
function buildImageShapeFromURL(url, offset = 0) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 480;
      const k = img.naturalWidth > maxW ? maxW / img.naturalWidth : 1;
      const r = cv.getBoundingClientRect();
      const c = { x: (r.width / 2 - view.x) / view.z, y: (r.height / 2 - view.y) / view.z };
      res({ id: uid(), type: 'image', href: url,
        x: c.x - img.naturalWidth * k / 2 + offset, y: c.y - img.naturalHeight * k / 2 + offset,
        w: img.naturalWidth * k, h: img.naturalHeight * k });
    };
    img.onerror = () => rej(new Error('Image load failed'));
    img.src = url;
  });
}
function cloneShapesWithFreshIds(shapes) {
  const gMap = {};
  return shapes.map(s => {
    const n = JSON.parse(JSON.stringify(s));
    n.id = uid();
    if (n.g) { gMap[n.g] = gMap[n.g] || ('G' + uid()); n.g = gMap[n.g]; }
    return n;
  });
}

async function applySelectedXlsxItems() {

      shapeN++;

      try {
        const dataUrl = await fileToDataURL(new Blob([it.data], { type: it.mime }));
        if (it.anchored) add.push({ id: uid(), type: 'image', href: dataUrl, x: it.x, y: it.y, w: it.w, h: it.h });
        else add.push(await buildImageShapeFromURL(dataUrl, imageN * 18));
        imageN++;

  state.shapes.push(...normalized);

/* =====================================================================
   KREATOR KADRU po imporcie XLSX — pozwala zaznaczyć obszar roboczy
   (przeciągnięciem na kanwie) i dopasować do niego format strony,
   opcjonalnie usuwając kształty leżące całkowicie poza nim.
   ===================================================================== */
function xlsxCropDefaultBox(shapes) {
  const b = unionBBox(shapes);
  if (!b) return { x: 0, y: 0, w: 400, h: 300 };
  const pad = 20;
  return { x: Math.round(b.x - pad), y: Math.round(b.y - pad), w: Math.round(b.w + pad * 2), h: Math.round(b.h + pad * 2) };
}
let xlsxCropImportedIds = null;   // id-y kształtów pochodzących z TEGO importu (do filtra "usuń poza obszarem")
function xlsxCropStart(justImportedShapes) {
  xlsxCropBox = xlsxCropDefaultBox(justImportedShapes);
  xlsxCropImportedIds = new Set(justImportedShapes.map(s => s.id));
  xlsxCropActive = true;
  const bar = $('#xlsxCropBar'); if (bar) bar.classList.add('on');
  const cb = $('#xlsxCropRemoveOutside'); if (cb) cb.checked = false;
  render();
}
function xlsxCropEnd() {
  xlsxCropActive = false; xlsxCropBox = null; xlsxCropImportedIds = null;
  const bar = $('#xlsxCropBar'); if (bar) bar.classList.remove('on');
  render();
}
function xlsxCropConfirm() {
  const box = xlsxCropBox;
  if (!box || box.w < 2 || box.h < 2) { toast(t('xlsxcrop.badBox')); return; }
  const removeOutside = !!($('#xlsxCropRemoveOutside') && $('#xlsxCropRemoveOutside').checked);
  const importedIds = xlsxCropImportedIds || new Set();
  pushUndo();
  if (removeOutside) {
    state.shapes = state.shapes.filter(s => {
      if (!importedIds.has(s.id)) return true;   /* nie ruszaj kształtów spoza tego importu */
      const b = aabbOf(s);
      /* usuń tylko te CAŁKOWICIE poza kadrem — zostaw wszystko, co choć trochę zachodzi */
      return b.x < box.x + box.w && b.x + b.w > box.x && b.y < box.y + box.h && b.y + b.h > box.y;
    });
  }
  const dx = -box.x, dy = -box.y;
  for (const s of state.shapes) {
    if (s.type === 'line') { s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy; }
    else { s.x += dx; s.y += dy; }
  }
  state.page = { mode: 'custom', w: Math.max(10, Math.round(box.w)), h: Math.max(10, Math.round(box.h)) };
  syncPageUI();
  xlsxCropEnd();
  sel.clear();
  fitPage(); render(); renderProps(); renderVars(); autosave();
  toast(t('xlsxcrop.done'));
}
$('#xlsxCropConfirm').addEventListener('click', xlsxCropConfirm);
$('#xlsxCropCancel').addEventListener('click', () => { xlsxCropEnd(); toast(t('xlsxcrop.cancelled')); });
/* import XLSX/XLSM — obrazy + kształty wektorowe (z pozycjami z arkusza) */
async function importXlsx(file) {
  try {
    if (typeof DecompressionStream === 'undefined') return toast(t('t.noDecomp'));
    toast(t('t.reading'));
    const buf = await file.arrayBuffer();
    const allFiles = await readZipAll(buf);
    const td = new TextDecoder();
    const mediaFiles = allFiles.filter(f => /^xl\/media\//i.test(f.name) && /\.(png|jpe?g|gif|bmp|webp)$/i.test(f.name));
    const mediaMap = {};
    mediaFiles.forEach(m => mediaMap[m.name] = { data: m.data, mime: mediaMimeFromName(m.name) });
    /* zmapuj każdy arkusz (sheetK.xml) na jego drawingN.xml (przez sheetK.xml.rels),
       żeby użyć WŁAŚCIWYCH wymiarów kolumn/wierszy TEGO arkusza — wcześniej zawsze
       brano pierwszy napotkany arkusz w archiwum, co psuło skalowanie/pozycję
       rysunków należących do arkusza 2, 3 itd. w skoroszytach wielo-arkuszowych */
    const sheetFiles = allFiles.filter(f => /^xl\/worksheets\/sheet\d+\.xml$/i.test(f.name));
    const drawingDims = {};   // 'xl/drawings/drawingN.xml' -> {colWidths, rowHeights} arkusza-właściciela
    for (const sf of sheetFiles) {
      const relPath = sf.name.replace(/^xl\/worksheets\//i, 'xl/worksheets/_rels/') + '.rels';
      const relFile = allFiles.find(f => f.name === relPath);
      if (!relFile) continue;
      const relXml = td.decode(relFile.data);
      for (const rm of relXml.matchAll(/<Relationship\b[^>]*\/?>/g)) {
        const tag = rm[0];
        const typeM = tag.match(/\bType="([^"]+)"/), targetM = tag.match(/\bTarget="([^"]+)"/);
        if (!typeM || !targetM || !/\/drawing$/i.test(typeM[1])) continue;
        const drawingPath = resolveRelTarget(sf.name, targetM[1]);
        if (drawingPath) drawingDims[drawingPath] = parseSheetDims(td.decode(sf.data));
      }
    }
    /* awaryjnie (brak .rels albo relacji arkusz->rysunek) — wymiary pierwszego arkusza */
    const fallbackDims = sheetFiles.length ? parseSheetDims(td.decode(sheetFiles[0].data)) : parseSheetDims('');

    const drawingFiles = allFiles.filter(f => /^xl\/drawings\/drawing\d+\.xml$/i.test(f.name));
    const importedShapes = [];
    const anchoredPictures = [];
    let unsupportedFallbacks = 0;
    for (const df of drawingFiles) {
      const relPath = df.name.replace(/^xl\/drawings\//i, 'xl/drawings/_rels/') + '.rels';
      const relFile = allFiles.find(f => f.name === relPath);
      const relMap = relFile ? parseDrawingRels(td.decode(relFile.data), df.name) : {};
      const dims = drawingDims[df.name] || fallbackDims;
      const parsed = parseDrawingShapes(td.decode(df.data), dims, relMap, mediaMap);
      importedShapes.push(...parsed.shapes);
      anchoredPictures.push(...parsed.pictures.map(p => ({ ...p, anchored: true })));
      unsupportedFallbacks += parsed.unsupportedFallbacks || 0;
    }
    const skippedEMF = allFiles.filter(f => /^xl\/media\//i.test(f.name) && /\.(emf|wmf)$/i.test(f.name)).length;
    if (!mediaFiles.length && !importedShapes.length && !anchoredPictures.length)
      return toast(t('xl.none') + (skippedEMF ? t('xl.emf', { n: skippedEMF }) : ''));
    closeXlsxModal();
    xlsxImportItems = [];
    const usedAnchored = new Set(anchoredPictures.map(p => 'xl/media/' + p.name.replace(/^xl\/media\//i, '')));

    /* uszereguj zakotwiczone elementy wg powierzchni MALEJĄCO, żeby duże tła trafiały
       na spód stosu (dodawane pierwsze = niższy z-order), a drobne detale i podpisy
       zostały na wierzchu, zamiast być przysłonięte przez większe kontenery */
    const anchoredCombined = [
      ...anchoredPictures.map(p => ({ kind: 'image', p, area: (p.w || 0) * (p.h || 0) })),
      ...importedShapes.map(s => ({ kind: 'shape', s, area: (s.w || 0) * (s.h || 0) }))
    ];
    anchoredCombined.sort((a, b) => b.area - a.area);

    let shapeIdx = 0;
    for (const it of anchoredCombined) {
      if (it.kind === 'image') {
        const p = it.p;
        xlsxImportItems.push({ kind: 'image', name: p.name, data: p.data, mime: p.mime, anchored: true,
          x: p.x, y: p.y, w: p.w, h: p.h,
          previewUrl: URL.createObjectURL(new Blob([p.data], { type: p.mime })), selected: true });
      } else {
        xlsxImportItems.push({ kind: 'shape', name: `${it.s.type}_${++shapeIdx}`, shape: it.s, selected: true });
      }
    }
    for (const m of mediaFiles) {
      if (usedAnchored.has(m.name)) continue;
      const mime = mediaMimeFromName(m.name);
      xlsxImportItems.push({ kind: 'image', name: m.name.replace('xl/media/', ''), data: m.data, mime, anchored: false,
        previewUrl: URL.createObjectURL(new Blob([m.data], { type: mime })), selected: true });
    }
    const imgN = xlsxImportItems.filter(i => i.kind === 'image').length;
    const shapeN = xlsxImportItems.length - imgN;
    $('#xlModal').querySelector('h3').textContent = t('xl.count', { i: imgN, s: shapeN });
    renderXlsxImportPicker(skippedEMF);
    if (unsupportedFallbacks) {
      const w = document.createElement('div');
      w.className = 'hint'; w.style.gridColumn = '1/-1';
      w.textContent = t('xl.fallback', { n: unsupportedFallbacks });
      $('#xlBody').appendChild(w);
    }
    $('#xlModal').classList.add('on');
  } catch (err) { toast(t('t.importErr') + err.message); }
}

function pageRegion() {

function fitPage() {
  const r = cv.getBoundingClientRect();
  const P = state.page;
  if (!P || P.mode === 'off') { view = { x: 60, y: 60, z: 1 }; return; }
  const z = clamp(Math.min((r.width - 80) / P.w, (r.height - 80) / P.h), 0.08, 2);
  view = { x: (r.width - P.w * z) / 2, y: (r.height - P.h * z) / 2, z };
}

  const P = state.page || { mode: 'off' };

  if (P.w) { $('#pageW').value = P.w; $('#pageH').value = P.h; }
}

/* utwórz nowy projekt z wybranego szablonu (null=pusty, 'builtin'=wbudowany) */
function projectFromTemplate(tmpl) {

    state.page = tmpl.page && tmpl.page.mode ? JSON.parse(JSON.stringify(tmpl.page)) : { mode: 'a4l', w: PAGES.a4l.w, h: PAGES.a4l.h };
    state.shapes.forEach(s => { s.id = uid(); });   /* świeże ID = niezależny projekt */

/* konfiguracja = ustawienia + biblioteka + szablony (jeden plik) */
function buildConfig() {
  return { app: 'prodrys-config', version: 1,
    settings: JSON.parse(JSON.stringify(settings)),
    lib: JSON.parse(JSON.stringify(lib)),
    libFolders: JSON.parse(JSON.stringify(libFolders)),
    templates: JSON.parse(JSON.stringify(templates)) };
}
function exportConfig() {
  downloadBlob(new Blob([JSON.stringify(buildConfig(), null, 1)], { type: 'application/json' }), 'prodrys_konfig.json');
  toast(t('t.cfgSaved'));
}
function importConfig(obj) {
  if (!obj || (obj.app !== 'prodrys-config' && obj.app !== 'prodrys-settings'))
    return toast(t('t.cfgBad'));
  if (obj.settings) { settings = Object.assign(settings, obj.settings); saveSettingsLS(); }
  if (Array.isArray(obj.lib)) {
    for (const it of obj.lib) if (!lib.some(l => l.name === it.name)) lib.push(it);
    saveLib();
  }
  if (Array.isArray(obj.libFolders)) {
    for (const f of obj.libFolders) if (!libFolders.includes(f)) libFolders.push(f);
    saveLibFolders();
  }
  if (Array.isArray(obj.templates)) {
    for (const it of obj.templates) {
      const i = templates.findIndex(x => x.name === it.name);
      if (i >= 0) templates[i] = it; else templates.push(it);
    }
    saveTemplatesLS();
  } else if (obj.template) {          /* zgodność ze starym plikiem ustawień */
    templates.push({ name: t('tmpl.default'), shapes: obj.template.shapes || [],
      vars: obj.template.vars || { cols: [], rows: [] }, page: obj.template.page || { mode: 'a4l', w: 1123, h: 794 } });
    saveTemplatesLS();
  }
  applySettings();
  toast(t('t.cfgLoaded'));
}

  document.documentElement.style.setProperty('--sideW', settings.sideW + 'px');

}

"use strict";
function renderHelp() {
  const el = $('#tab-help'); if (!el) return;
  el.innerHTML = HELP_HTML[settings.lang] || HELP_HTML.pl;
}
function renderSettings() {
  const el = $('#tab-settings');
  const D = settings.defaults || (settings.defaults = { font: 'Calibri', fs: 14, sw: 2, stroke: '#000000', fill: '#ffffff', tc: '#000000' });
  const fonts = ['Calibri', 'Arial', 'Helvetica', 'Times New Roman', 'Georgia', 'Verdana', 'Courier New', 'Trebuchet MS', 'Impact'];
  el.innerHTML = `
    <div class="grp"><h4>${t('set.language')}</h4>
      <div class="setRow"><select class="in wide" id="setLang">
        <option value="pl" ${settings.lang === 'pl' ? 'selected' : ''}>Polski</option>
        <option value="en" ${settings.lang === 'en' ? 'selected' : ''}>English</option>
        <option value="de" ${settings.lang === 'de' ? 'selected' : ''}>Deutsch</option>
      </select></div></div>
    <div class="grp"><h4>${t('set.zoom')}</h4>
      <div class="setRow"><label style="min-width:0"><input type="checkbox" id="setMx" ${settings.mxMaster ? 'checked' : ''}> ${t('set.mxMaster')}</label></div>
      <div class="hint" style="margin-bottom:8px">${t('set.mxMasterHint')}</div>
      <div class="row"><label>${t('set.zoomDiv')}</label><input class="in" type="number" id="setZoomDiv" min="1" max="20" step="1" value="${settings.zoomDiv}"></div>
    </div>
    <div class="grp"><h4>${t('set.panel')}</h4>
      <div class="row"><label>${t('set.panelWidth')}</label><input class="in" type="number" id="setSideW" min="200" max="640" step="10" value="${settings.sideW}"></div>
    </div>
    <div class="grp"><h4>${t('set.autosave')}</h4>
      <div class="setRow"><label style="min-width:0"><input type="checkbox" id="setAutosave" ${settings.autosave !== false ? 'checked' : ''}> ${t('set.autosave')}</label></div>
      <div class="hint">${t('set.autosaveHint')}</div>
    </div>
    <div class="grp"><h4>${t('set.canvas')}</h4>
      <div class="row"><label>${t('set.infMargin')}</label><input class="in" type="number" id="setInfMargin" min="0" max="500" step="1" value="${settings.infiniteCanvasMargin ?? 16}"></div>
      <div class="hint">${t('set.infMarginHint')}</div>
    </div>
    <div class="grp"><h4>${t('set.defaults')}</h4>
      <div class="row"><label>${t('props.font')}</label><select class="in" id="dFont" style="width:130px">
        ${fonts.map(f => `<option value="${f}" ${D.font === f ? 'selected' : ''}>${f}</option>`).join('')}</select></div>
      <div class="row"><label>${t('props.size')}</label><input class="in" type="number" id="dFs" min="4" value="${D.fs}"></div>
      <div class="row"><label>${t('props.width')}</label><input class="in" type="number" id="dSw" min="0.5" step="0.5" value="${D.sw}"></div>
      <div class="row"><label>${t('set.colStroke')}</label><input class="in" type="color" id="dStroke" value="${D.stroke}"></div>
      <div class="row"><label>${t('set.colText')}</label><input class="in" type="color" id="dTc" value="${D.tc}"></div>
      <div class="row"><label>${t('set.colFill')}</label><input class="in" type="color" id="dFill" value="${D.fill}"></div></div>
    <div class="grp"><h4>${t('set.config')}</h4>
      <div class="row"><button class="btn" id="setTmpl">${t('config.saveTmpl')}</button></div>
      <div class="row"><button class="btn" id="setExpCfg">${t('config.save')}</button>
        <button class="btn" id="setImpCfg">${t('config.load')}</button></div></div>
    <div class="grp"><div class="hint">${t('set.about')}</div></div>`;
  $('#setLang').addEventListener('change', e => { settings.lang = e.target.value; saveSettingsLS(); applySettings(); });
  $('#setMx').addEventListener('change', e => { settings.mxMaster = e.target.checked; saveSettingsLS(); });
  $('#setAutosave').addEventListener('change', e => { settings.autosave = e.target.checked; saveSettingsLS(); if (settings.autosave) autosave(); });
  $('#setInfMargin').addEventListener('change', e => { settings.infiniteCanvasMargin = clamp(parseInt(e.target.value) || 0, 0, 500); saveSettingsLS(); });
  $('#setZoomDiv').addEventListener('change', e => { settings.zoomDiv = clamp(parseFloat(e.target.value) || 4, 1, 20); saveSettingsLS(); });
  $('#setSideW').addEventListener('change', e => {
    settings.sideW = clamp(parseInt(e.target.value) || 272, 200, 640); saveSettingsLS();
    document.documentElement.style.setProperty('--sideW', settings.sideW + 'px'); render();
  });
  const dSave = () => saveSettingsLS();
  $('#dFont').addEventListener('change', e => { D.font = e.target.value; dSave(); });
  $('#dFs').addEventListener('change', e => { D.fs = Math.max(4, parseFloat(e.target.value) || 14); dSave(); });
  $('#dSw').addEventListener('change', e => { D.sw = Math.max(0.5, parseFloat(e.target.value) || 2); dSave(); });
  $('#dStroke').addEventListener('change', e => { D.stroke = e.target.value; dSave(); });
  $('#dTc').addEventListener('change', e => { D.tc = e.target.value; dSave(); });
  $('#dFill').addEventListener('change', e => { D.fill = e.target.value; dSave(); });
  $('#setTmpl').addEventListener('click', saveAsTemplate);
  $('#setExpCfg').addEventListener('click', exportConfig);
  $('#setImpCfg').addEventListener('click', () => $('#fSettings').click());
}
$('#pageSel').addEventListener('change', () => {
  const m = $('#pageSel').value;
  if (m === 'off') state.page = { mode: 'off' };
  else if (m === 'custom') state.page = { mode: 'custom',
    w: +$('#pageW').value || 1123, h: +$('#pageH').value || 794 };
  else state.page = { mode: m, w: PAGES[m].w, h: PAGES[m].h };
  syncPageUI();
  if (m !== 'off') fitPage();
  render(); autosave();
});
['pageW', 'pageH'].forEach(id => $('#' + id).addEventListener('change', () => {
  if (state.page.mode !== 'custom') return;
  state.page.w = Math.max(50, +$('#pageW').value || 1123);
  state.page.h = Math.max(50, +$('#pageH').value || 794);
  fitPage(); render(); autosave();
}));

"use strict";
/* ---------- menu rozwijane ---------- */

$$('.menu > [data-menu]').forEach(btn => btn.addEventListener('click', e => {
  e.stopPropagation();
  const m = btn.parentElement, wasOpen = m.classList.contains('open');
  closeMenus();
  if (!wasOpen) m.classList.add('open');
}));
$$('.menuItem').forEach(it => it.addEventListener('click', closeMenus));
document.addEventListener('click', closeMenus);

  const f = e.target.files[0]; e.target.value = '';
  if (!f) return;
  try { importConfig(JSON.parse(await f.text())); }
  catch (err) { toast(t('t.cfgBad')); }
});
$('#bSave').addEventListener('click', () => saveProject());

  currentProjectHandle = null;   /* z pobranego pliku nie ma uchwytu do zapisu */

});
$('#bXlsx').addEventListener('click', () => $('#fXlsx').click());

$('#bJpgAs').addEventListener('click', () => exportImage('jpg', true));

/* ---------- przeciągnij i upuść pliki na okno ---------- */
window.addEventListener('dragover', e => { e.preventDefault(); });
window.addEventListener('drop', async e => {
  e.preventDefault();
  /* spróbuj pobrać uchwyt pliku (zapis w miejscu dla przeciągniętego projektu) */
  let handle = null;
  const it0 = e.dataTransfer && e.dataTransfer.items && e.dataTransfer.items[0];
  if (it0 && it0.getAsFileSystemHandle) { try { handle = await it0.getAsFileSystemHandle(); } catch (er) {} }
  const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (!f) return;
  if (/\.(pdraw|json|prodrys)$/i.test(f.name)) {
    try {
      const obj = JSON.parse(await f.text());
      if (obj.app === 'prodrys-config' || obj.app === 'prodrys-settings') importConfig(obj);
      else { loadProject(obj, f.name); currentProjectHandle = (handle && handle.kind === 'file') ? handle : null; }
    } catch (err) { toast(t('t.badFile')); }
  } else if (/\.(xlsx|xlsm)$/i.test(f.name)) {
    importXlsx(f);
  } else if (f.type.startsWith('image/')) {
    insertImageURL(await fileToDataURL(f));
  }
});

/* ---------- suwak szerokości panelu bocznego ---------- */
(function () {
  const rz = $('#sideResizer'); if (!rz) return;
  let dragging = false;
  rz.addEventListener('pointerdown', e => { dragging = true; rz.setPointerCapture(e.pointerId); e.preventDefault(); });
  rz.addEventListener('pointermove', e => {
    if (!dragging) return;
    const w = clamp(window.innerWidth - e.clientX, 200, 640);
    settings.sideW = Math.round(w);
    document.documentElement.style.setProperty('--sideW', settings.sideW + 'px');
    render();
  });
  rz.addEventListener('pointerup', () => { if (dragging) { dragging = false; saveSettingsLS(); renderSettings(); } });
})();

document.addEventListener('keydown', e => {
  const inField = document.activeElement &&
    ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName);
  if (e.code === 'Space' && !inField) { spaceDown = true; cv.classList.add('t-pan'); e.preventDefault(); }
  if (inField) return;
  const K = e.key.toLowerCase();
  if (e.ctrlKey || e.metaKey) {
    if (K === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); }
    else if (K === 'y') { e.preventDefault(); redo(); }
    else if (K === 's') { e.preventDefault(); saveProject(); }
    else if (K === 'o') { e.preventDefault(); $('#fOpen').click(); }
    else if (K === 'c') { e.preventDefault(); copySel(); }
    else if (K === 'd') { e.preventDefault(); duplicateSel(); }
    else if (K === 'a') { e.preventDefault(); setSelection(state.shapes.map(s => s.id)); }
    else if (K === 'g') { e.preventDefault(); e.shiftKey ? ungroupSel() : groupSel(); }
    return;
  }
  if (K === 'delete' || K === 'backspace') { e.preventDefault(); deleteSel(); }
  else if (K === 'escape') { if (cropMode) { cropMode = null; } sel.clear(); setTool('select'); render(); renderProps(); }
  else if (K === 'v') setTool('select');
  else if (K === 'r') setTool('rect');
  else if (K === 'c') setTool('ellipse');
  else if (K === 'l') setTool('line');
  else if (K === 'a') setTool('arrow');
  else if (K === 't') setTool('text');
  else if (K === 's') openShapeModal();
  else if (K === 'i') $('#fImg').click();
  else if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomAtCenter(1.25); }
  else if (e.key === '-' || e.key === '_') { e.preventDefault(); zoomAtCenter(1 / 1.25); }
  else if (e.key.startsWith('Arrow') && sel.size) {
    if (hasMoveLock()) { e.preventDefault(); return lockToast(); }
    e.preventDefault(); pushUndo();
    const d = e.shiftKey ? 10 : 1;
    const dx = e.key === 'ArrowLeft' ? -d : e.key === 'ArrowRight' ? d : 0;
    const dy = e.key === 'ArrowUp' ? -d : e.key === 'ArrowDown' ? d : 0;
    selShapes().forEach(s => {
      if (s.type === 'line') { s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy; }
      else { s.x += dx; s.y += dy; }
    });
    render(); refreshXYWH(); autosave();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceDown = false; cv.setAttribute('class', 't-' + tool); }
