/* zapis przy zamknięciu okna — patrz PS_init() w js/projects.js (respektuje
   przełącznik Autozapis i zwalnia gniazda w rejestrze "żywych" projektów) */


"use strict";

/**
 * Tabs module - renders and manages the project tab strip, plus the
 * "closed projects" popover (reopen an earlier project, or delete it
 * forever). Pure DOM rendering + event wiring; all state logic lives in
 * js/projects.js (PS_* functions).
 */

/**
 * Render the project tab strip.
 * Clears the container and rebuilds all tabs from current open slots.
 */
function Tabs_render() {
	var bar = document.getElementById('tabsBar');
	if (!bar) return;

	bar.innerHTML = '';

	var slots = PS_openSlots();
	var activeSlot = PS_activeSlot();

	// Render each open project tab
	slots.forEach(function(slot) {
		var tab = document.createElement('div');
		tab.className = 'ptab';
		if (slot === activeSlot) {
			tab.className += ' active';
		}
		tab.setAttribute('data-slot', slot);

		// Project name span
		var nameSpan = document.createElement('span');
		nameSpan.className = 'ptab-name';
		var projName = PS_projectName(slot);
		nameSpan.textContent = projName;
		nameSpan.title = projName;

		// Close button
		var closeBtn = document.createElement('button');
		closeBtn.className = 'ptab-x';
		closeBtn.textContent = '×';
		closeBtn.title = 'Zamknij';

		// Close button click handler
		closeBtn.addEventListener('click', function(e) {
			e.stopPropagation();
			PS_closeTab(slot);
		});

		// Tab click handler (switch to this tab)
		tab.addEventListener('click', function() {
			PS_switchTo(slot);
		});

		tab.appendChild(nameSpan);
		tab.appendChild(closeBtn);
		bar.appendChild(tab);
	});

	// Add "new project" button
	var addBtn = document.createElement('button');
	addBtn.className = 'ptab-add';
	addBtn.id = 'ptabAdd';
	addBtn.textContent = '+';
	addBtn.title = 'Nowy projekt';
	addBtn.addEventListener('click', function() {
		openTemplatePicker();
	});
	bar.appendChild(addBtn);

	// "Open a saved (closed) project" button — this is how you get back a
	// project you previously closed with ×, or delete it forever.
	var openBtn = document.createElement('button');
	openBtn.className = 'ptab-add';
	openBtn.id = 'ptabOpen';
	openBtn.textContent = '📂';
	openBtn.title = t('ptab.openSaved');
	openBtn.addEventListener('click', Tabs_togglePanel);
	bar.appendChild(openBtn);

	if (_ptabPanelOpen) Tabs_renderClosedPanel();
}

/**
 * Open the template picker to create a new project tab.
 * Entry point for native menu and other UI code.
 */
function Tabs_new() {
	if (typeof openTemplatePicker === 'function') {
		openTemplatePicker();
	}
}

/* ---------- panel "otwórz zapisany projekt" ---------- */
let _ptabPanelOpen = false;

function Tabs_togglePanel(e) {
	if (e) e.stopPropagation();
	_ptabPanelOpen = !_ptabPanelOpen;
	if (_ptabPanelOpen) Tabs_renderClosedPanel();
	else Tabs_closePanel();
}
function Tabs_closePanel() {
	_ptabPanelOpen = false;
	const panel = document.getElementById('ptabPanel');
	if (panel) panel.classList.remove('on');
}

function Tabs_renderClosedPanel() {
	let panel = document.getElementById('ptabPanel');
	if (!panel) {
		panel = document.createElement('div');
		panel.className = 'ptab-panel';
		panel.id = 'ptabPanel';
		panel.addEventListener('click', function (e) { e.stopPropagation(); });
		document.body.appendChild(panel);
	}
	panel.innerHTML = '';

	const closed = PS_closedProjects();
	if (!closed.length) {
		const empty = document.createElement('div');
		empty.className = 'ptab-panel-empty';
		empty.textContent = t('ptab.noClosed');
		panel.appendChild(empty);
	} else {
		closed.forEach(function (p) {
			const row = document.createElement('div');
			row.className = 'ptab-panel-row';

			const name = document.createElement('span');
			name.className = 'ptab-panel-name';
			name.textContent = p.name;
			name.title = p.name;
			name.addEventListener('click', function () {
				PS_reopenProject(p.slot);
				Tabs_closePanel();
			});

			const del = document.createElement('button');
			del.className = 'ptab-panel-del';
			del.textContent = '✕';
			del.title = t('ptab.delTitle');
			del.addEventListener('click', function (e) {
				e.stopPropagation();
				if (!confirm(t('ptab.delConfirm', { n: p.name }))) return;
				PS_deleteProject(p.slot);
				Tabs_renderClosedPanel();
			});

			row.appendChild(name);
			row.appendChild(del);
			panel.appendChild(row);
		});
	}

	const btn = document.getElementById('ptabOpen');
	if (btn) {
		const r = btn.getBoundingClientRect();
		panel.style.left = r.left + 'px';
		panel.style.top = (r.bottom + 4) + 'px';
	}
	panel.classList.add('on');
}

document.addEventListener('click', function () { if (_ptabPanelOpen) Tabs_closePanel(); });

"use strict";
/* ---------- start ---------- */
(function init() {
  /* ustawienia aplikacji */
  try { const st = localStorage.getItem('prodrys_settings');
    if (st) settings = Object.assign(settings, JSON.parse(st)); } catch (e) {}
  if (!I18N[settings.lang]) settings.lang = 'pl';
  document.documentElement.style.setProperty('--sideW', settings.sideW + 'px');
  applyI18n();
  /* biblioteka */
  try { const l = localStorage.getItem('prodrys_lib');
    lib = l ? JSON.parse(l) : null; } catch (e) { lib = null; }
  if (!Array.isArray(lib) || !lib.length) seedLib();
  /* odśwież wbudowane elementy biblioteki do aktualnej wersji */
  for (const d of defaultLibItems()) {
    const i = lib.findIndex(l => l.name === d.name);
    if (i >= 0) lib[i] = Object.assign(d, { folder: lib[i].folder || '' }); else lib.unshift(d);
  }
  saveLib();
  try { const lf = localStorage.getItem('prodrys_libfolders'); libFolders = lf ? JSON.parse(lf) : []; } catch (e) { libFolders = []; }
  if (!Array.isArray(libFolders)) libFolders = [];
  /* szablony (z migracją starego pojedynczego szablonu) */
  try { const tp = localStorage.getItem('prodrys_templates');
    templates = tp ? JSON.parse(tp) : []; } catch (e) { templates = []; }
  if (!Array.isArray(templates)) templates = [];
  try {
    const oldT = localStorage.getItem('prodrys_template');
    if (oldT && !templates.length) {
      const o = JSON.parse(oldT);
      if (o && Array.isArray(o.shapes))
        templates.push({ name: t('tmpl.default'), shapes: o.shapes,
          vars: o.vars || { cols: [], rows: [] }, page: o.page || { mode: 'a4l', w: 1123, h: 794 } });
      saveTemplatesLS();
    }
  } catch (e) {}
  /* zasil edytowalnym domyślnym szablonem (można go nadpisać/usunąć) */
  if (!templates.length) {
    templates.push({ name: t('tmpl.default'), shapes: templateShapes(PAGES.a4l.w, PAGES.a4l.h),
      vars: { cols: [], rows: [] }, page: { mode: 'a4l', w: PAGES.a4l.w, h: PAGES.a4l.h } });
    saveTemplatesLS();
  }
  /* projekty + karty (rejestr wielu projektów, gniazda autozapisu per karta) */
  PS_init();
  renderLib();
  renderSettings();
  renderHelp();
})();

"use strict";

/**
 * Desktop Menu Integration for ProdDraw Electron App
 *
 * This script wires native menu commands (sent via IPC from electron/main.js)
 * to corresponding app functions. All calls are guarded with type/existence checks.
 * In a plain browser (no Electron), this file does nothing.
 */

/**
 * Dispatch a menu command to the appropriate app function
 */
function dispatch(cmd) {
  switch (cmd) {
    case 'new':
      // Try to open new project via Tabs_new or openTemplatePicker
      if (typeof Tabs_new === 'function') {
        Tabs_new();
      } else if (typeof openTemplatePicker === 'function') {
        openTemplatePicker();
      }
      break;

    case 'open':
      if (typeof openProjectNative === 'function') {
        openProjectNative();
      }
      break;

    case 'save':
      if (typeof saveProject === 'function') {
        saveProject();
      }
      break;

    case 'saveAs':
      if (typeof saveProjectAs === 'function') {
        saveProjectAs();
      }
      break;

    case 'importXlsx':
      var el = document.getElementById('fXlsx');
      if (el) el.click();
      break;

    case 'insertImage':
      var el = document.getElementById('fImg');
      if (el) el.click();
      break;

    case 'exportPng':
      if (typeof exportImage === 'function') {
        exportImage('png');
      }
      break;

    case 'exportJpg':
      if (typeof exportImage === 'function') {
        exportImage('jpg');
      }
      break;

    case 'undo':
      if (typeof undo === 'function') {
        undo();
      }
      break;

    case 'redo':
      if (typeof redo === 'function') {
        redo();
      }
      break;

    case 'copy':
      if (typeof copySel === 'function') {
        copySel();
      }
      break;

    case 'duplicate':
      if (typeof duplicateSel === 'function') {
        duplicateSel();
      }
      break;

    case 'delete':
      if (typeof deleteSel === 'function') {
        deleteSel();
      }
      break;

    case 'group':
      if (typeof groupSel === 'function') {
        groupSel();
      }
      break;

    case 'ungroup':
      if (typeof ungroupSel === 'function') {
        ungroupSel();
      }
      break;

    case 'zoomIn':
      var el = document.getElementById('bZoomIn');
      if (el) el.click();
      break;

    case 'zoomOut':
      var el = document.getElementById('bZoomOut');
      if (el) el.click();
      break;

    case 'fit':
      if (typeof fitPage === 'function') {
        fitPage();
        if (typeof render === 'function') {
          render();
        }
      }
      break;

    case 'shapes':
      if (typeof openShapeModal === 'function') {
        openShapeModal();
      }
      break;

    default:
      console.warn('Unknown desktop menu command:', cmd);
  }
}

/**
 * Register the IPC listener if running in Electron
 */
if (window.prodrawDesktop && typeof window.prodrawDesktop.onMenu === 'function') {
  window.prodrawDesktop.onMenu(dispatch);
  // Hide in-page menu buttons when running in Electron (native menu replaces them)
  document.body.classList.add('desktop-mode');
}
