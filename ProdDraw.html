<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProdDraw — Production Drawing Editor</title>
<style>
:root{
  --bg:#1b1e23; --panel:#22262c; --panel2:#282d34; --line:#343a43;
  --txt:#d8dce2; --txt2:#8b93a0; --acc:#ffb020; --acc2:#e09000;
  --canvas:#eef0f3; --grid:#dde1e7; --sel:#1d7fd4; --guide:#e6007e;
  font-size:14px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden;}
body{
  font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--txt);
  display:grid; grid-template-rows:46px 1fr 30px;
  grid-template-columns:46px 1fr 272px;
  grid-template-areas:"tb tb tb" "rail canvas side" "status status status";
}
/* ---------- top bar ---------- */
.tb{grid-area:tb; display:flex; align-items:center; gap:8px; padding:0 10px;
  background:var(--panel); border-bottom:1px solid var(--line);}
.logo{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--acc);}
.logo svg{display:block;width:28px;height:28px;}
#projName{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  padding:5px 9px;border-radius:3px;width:230px;font-family:ui-monospace,Consolas,monospace;}
#projName:focus{outline:none;border-color:var(--acc);}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  padding:5px 11px;border-radius:3px;cursor:pointer;font-size:13px;white-space:nowrap;}
.btn:hover{border-color:var(--acc);color:#fff;}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#1b1e23;font-weight:600;}
.btn.primary:hover{background:var(--acc2);}
.btn:disabled{opacity:.4;cursor:default;}
.btn:disabled:hover{border-color:var(--line);color:var(--txt);}
.sep{width:1px;height:24px;background:var(--line);margin:0 2px;}
.spacer{flex:1;}
/* ---------- tool rail ---------- */
.rail{grid-area:rail;background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:4px;}
.tool{width:34px;height:34px;border:1px solid transparent;border-radius:4px;background:none;
  color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tool:hover{color:#fff;background:var(--panel2);}
.tool.on{color:var(--acc);border-color:var(--acc);background:var(--panel2);}
.tool svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.7;}
/* ---------- canvas ---------- */
.canvasWrap{grid-area:canvas;position:relative;overflow:hidden;background:var(--canvas);}
#cv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
#cv text{-webkit-user-select:none;user-select:none;}
#cv.t-select{cursor:default;} #cv.t-pan{cursor:grab;} #cv.panning{cursor:grabbing;}
#cv.t-rect,#cv.t-ellipse,#cv.t-line,#cv.t-arrow{cursor:crosshair;}
#cv.t-text{cursor:text;}
#txtEd{position:absolute;display:none;background:#fff;border:1.5px solid var(--sel);
  font-family:Arial,sans-serif;resize:none;overflow:hidden;padding:2px 4px;line-height:1.25;
  box-shadow:0 2px 10px rgba(0,0,0,.25);z-index:20;}
#txtEd.editing{border:2px solid var(--acc);box-shadow:0 0 0 3px rgba(255,176,32,.2),0 8px 18px rgba(0,0,0,.35);}
/* ---------- side panel ---------- */
.side{grid-area:side;background:var(--panel);border-left:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0;}
.tabbar{display:flex;border-bottom:1px solid var(--line);}
.tab{flex:1;padding:8px 0;text-align:center;cursor:pointer;color:var(--txt2);
  font-size:12.5px;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.tabBody{flex:1;overflow-y:auto;padding:10px;display:none;min-height:0;}
.tabBody.on{display:block;}
.grp{margin-bottom:14px;}
.grp h4{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2);
  margin-bottom:7px;font-weight:600;}
.row{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.row label{font-size:12px;color:var(--txt2);min-width:58px;}
.in{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  padding:4px 6px;border-radius:3px;font-size:12.5px;width:64px;
  font-family:ui-monospace,Consolas,monospace;}
.in:focus{outline:none;border-color:var(--acc);}
.in.wide{width:100%;} select.in{width:auto;font-family:inherit;}
input[type=color].in{padding:1px;width:34px;height:26px;cursor:pointer;}
input[type=checkbox]{accent-color:var(--acc);}
.miniBtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  min-width:28px;width:30px;height:28px;border-radius:3px;cursor:pointer;display:inline-flex;
  align-items:center;justify-content:center;padding:0 6px;}
.miniBtn:hover{border-color:var(--acc);color:#fff;}
.miniBtn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;}
.hint{font-size:11.5px;color:var(--txt2);line-height:1.45;}
.empty{color:var(--txt2);font-size:12.5px;text-align:center;padding:24px 8px;line-height:1.5;}
/* library */
.libItem{border:1px solid var(--line);border-radius:4px;margin-bottom:8px;background:var(--panel2);overflow:hidden;}
.libThumb{background:#fff;height:64px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.libThumb svg{width:92%;height:56px;}
.libRow{display:flex;align-items:center;padding:4px 6px;gap:4px;}
.libRow span{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* variants */
#varTbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px;}
#varTbl th,#varTbl td{border:1px solid var(--line);padding:0;}
#varTbl th{background:var(--panel2);padding:4px;font-weight:600;position:relative;}
#varTbl input{width:100%;background:none;border:none;color:var(--txt);padding:4px;font-size:12px;font-family:ui-monospace,monospace;}
#varTbl input:focus{outline:1px solid var(--acc);background:var(--panel2);}
.delX{position:absolute;top:1px;right:1px;background:none;border:none;color:var(--txt2);cursor:pointer;font-size:10px;padding:1px 3px;}
.delX:hover{color:#ff5555;}
/* status bar */
.status{grid-area:status;display:flex;align-items:center;gap:14px;padding:0 12px;
  background:var(--panel);border-top:1px solid var(--line);font-size:12px;color:var(--txt2);}
.status label{display:flex;align-items:center;gap:5px;cursor:pointer;}
.status .in{width:46px;padding:2px 4px;}
/* modal */
.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
  align-items:center;justify-content:center;z-index:50;}
.modalBg.on{display:flex;}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:6px;
  width:640px;max-width:92vw;max-height:84vh;display:flex;flex-direction:column;}
.modal h3{padding:12px 16px;border-bottom:1px solid var(--line);font-size:14px;}
.modalBody{padding:14px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.xlImg{border:1px solid var(--line);border-radius:4px;background:#fff;cursor:pointer;
  padding:4px;display:flex;flex-direction:column;gap:4px;}
.xlImg:hover{border-color:var(--acc);}
.xlImg img{width:100%;height:100px;object-fit:contain;}
.xlImg div{font-size:10.5px;color:var(--txt2);text-align:center;overflow:hidden;text-overflow:ellipsis;}
.xlSel{display:flex;align-items:center;gap:6px;padding:2px 2px 0;}
.xlSel label{font-size:11px;color:#20242b;display:flex;align-items:center;gap:4px;cursor:pointer;}
.xlSel input{accent-color:var(--acc);}
.xlShapePrev{width:100%;height:100px;display:flex;align-items:center;justify-content:center;background:#fff;}
.xlShapePrev svg{width:96%;height:92px;}
.modalFoot{padding:10px 16px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}
/* toast */
#toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:8px 18px;border-radius:4px;font-size:13px;
  opacity:0;transition:opacity .25s;pointer-events:none;z-index:60;border:1px solid var(--acc);}
#toast.on{opacity:1;}
::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px;}
</style>
</head>
<body>

<!-- ======= TOP BAR ======= -->
<div class="tb">
  <div class="logo" title="ProdDraw">
    <svg viewBox="0 0 28 28" width="28" height="28" fill="none">
      <rect x="2" y="3" width="17" height="22" rx="2" fill="#ffb020" opacity=".15" stroke="#ffb020" stroke-width="1.5"/>
      <rect x="9" y="6" width="17" height="22" rx="2" fill="#1b1e23" stroke="#ffb020" stroke-width="1.5"/>
      <path d="M13 12h8M13 16h8M13 20h5" stroke="#ffb020" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <input id="projName" value="Instrukcja_01" spellcheck="false" title="Nazwa projektu — użyta w nazwach plików">
  <div class="sep"></div>
  <button class="btn" id="bNew">Nowy</button>
  <button class="btn" id="bOpen">Otwórz</button>
  <button class="btn" id="bSave">Zapisz projekt</button>
  <button class="btn" id="bXlsx">Import XLSX</button>
  <div class="sep"></div>
  <button class="btn" id="bTmpl" title="Zapisz bieżący projekt jako domyślny szablon nowych projektów">Szablon ↓</button>
  <button class="btn" id="bExpSet" title="Library and template are auto-saved to browser localStorage — use this to export for another browser/device">Save Settings ↓</button>
  <button class="btn" id="bImpSet" title="Import library/template exported from another browser/device">Load Settings ↑</button>
  <div class="sep"></div>
  <button class="btn primary" id="bJpg">Export JPG</button>
  <div class="spacer"></div>
  <button class="btn" id="bUndo" title="Cofnij (Ctrl+Z)">&#x21B6;</button>
  <button class="btn" id="bRedo" title="Ponów (Ctrl+Y)">&#x21B7;</button>
</div>

<!-- ======= TOOL RAIL ======= -->
<div class="rail">
  <button class="tool on" data-tool="select" title="Zaznaczanie (V)"><svg viewBox="0 0 24 24"><path d="M6 3l12 9-6 1 3 7-3 1-3-7-4 4z"/></svg></button>
  <button class="tool" data-tool="rect" title="Prostokąt (R)"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12"/></svg></button>
  <button class="tool" data-tool="ellipse" title="Elipsa / koło (C)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></button>
  <button class="tool" data-tool="line" title="Linia (L)"><svg viewBox="0 0 24 24"><path d="M4 20L20 4"/></svg></button>
  <button class="tool" data-tool="arrow" title="Strzałka (A)"><svg viewBox="0 0 24 24"><path d="M4 20L18 6M18 6h-6M18 6v6"/></svg></button>
  <button class="tool" data-tool="text" title="Tekst (T)"><svg viewBox="0 0 24 24"><path d="M5 6h14M12 6v13"/></svg></button>
  <button class="tool" data-tool="shapes" title="Kształty dodatkowe (S)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><polygon points="12,3 22,21 2,21"/></svg></button>
  <button class="tool" data-tool="image" title="Wstaw obraz PNG/JPG (I)"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14"/><path d="M4 15l5-5 4 4 3-3 4 4"/><circle cx="9" cy="9" r="1.4"/></svg></button>
</div>

<!-- ======= CANVAS ======= -->
<div class="canvasWrap" id="cwrap">
  <svg id="cv" class="t-select"></svg>
  <textarea id="txtEd" spellcheck="false"></textarea>
</div>

<!-- ======= SIDE PANEL ======= -->
<div class="side">
  <div class="tabbar">
    <button class="tab on" data-tab="props">Właściwości</button>
    <button class="tab" data-tab="lib">Biblioteka</button>
    <button class="tab" data-tab="vars">Warianty</button>
  </div>
  <div class="tabBody on" id="tab-props"></div>
  <div class="tabBody" id="tab-lib"></div>
  <div class="tabBody" id="tab-vars"></div>
</div>

<!-- ======= STATUS ======= -->
<div class="status">
  <label>Format <select class="in" id="pageSel" style="width:118px">
    <option value="a4l">A4 poziomo</option>
    <option value="a4p">A4 pionowo</option>
    <option value="hd">1600×900</option>
    <option value="custom">Własny</option>
    <option value="off">∞ nieskończony</option>
  </select></label>
  <span id="pageWH" style="display:none">
    <input class="in" type="number" id="pageW" value="1123" min="50"> ×
    <input class="in" type="number" id="pageH" value="794" min="50"> px
  </span>
  <div class="sep"></div>
  <label><input type="checkbox" id="snapG" checked> Przyciągaj do siatki</label>
  <label>Siatka <input class="in" type="number" id="gridSize" value="10" min="1" max="200"> px</label>
  <label><input type="checkbox" id="snapO" checked> Przyciągaj do obiektów</label>
  <div class="spacer"></div>
  <button class="miniBtn" id="bZoomOut" title="Zoom out (-)">-</button>
  <span id="zoomLbl">100%</span>
  <button class="miniBtn" id="bZoomIn" title="Zoom in (+)">+</button>
  <span>Space/Middle = pan &nbsp;|&nbsp; Dbl-click = text</span>
</div>

<!-- ======= MODAL: XLSX ======= -->
<div class="modalBg" id="xlModal">
  <div class="modal">
    <h3>Obrazy znalezione w pliku — kliknij, aby wstawić</h3>
    <div class="modalBody" id="xlBody"></div>
    <div class="modalFoot"><button class="btn" id="xlClose">Zamknij</button></div>
  </div>
</div>

<!-- MODAL: SHAPES -->
<div class="modalBg" id="shapeModal">
  <div class="modal" style="width:520px">
    <h3>Kształty dodatkowe — kliknij, aby dodać</h3>
    <div class="modalBody" id="shapeBody"></div>
    <div class="modalFoot"><button class="btn" id="shapeClose">Zamknij</button></div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="fOpen" accept=".pdraw,.json,.prodrys" hidden>
<input type="file" id="fXlsx" accept=".xlsx,.xlsm" hidden>
<input type="file" id="fImg" accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml" hidden>
<input type="file" id="fSettings" accept=".json" hidden>

<script>
"use strict";
/* =====================================================================
   ProdDraw — jednoplikowy edytor wektorowy do instrukcji produkcyjnych
   ===================================================================== */
const $ = q => document.querySelector(q);
const $$ = q => [...document.querySelectorAll(q)];
const cv = $('#cv'), cwrap = $('#cwrap'), txtEd = $('#txtEd');

/* ---------- stan ---------- */
let state = {
  name: 'Instrukcja_01',
  shapes: [],                    // kolejność = z-order (0 = spód)
  vars: { cols: [], rows: [] },  // warianty
  page: { mode: 'a4l', w: 1123, h: 794 }, // format kanwy; mode 'off' = nieskończona
};
const PAGES = {
  a4l: { w: 1123, h: 794 }, a4p: { w: 794, h: 1123 },
  hd: { w: 1600, h: 900 }, custom: {}, off: {}
};
let view = { x: 60, y: 60, z: 1 };
let sel = new Set();
let tool = 'select';
let lib = [];                    // biblioteka grup
let guides = [];                 // linie pomocnicze przyciągania
let previewRow = -1;             // -1 = brak podglądu wariantu
let clip = null;                 // wewnętrzny schowek kształtów
let spaceDown = false;
let matrixGap = 0;          // odstęp w układzie macierzowym

let uidN = 1;
const uid = () => 'S' + (uidN++) + '_' + Date.now().toString(36);

/* ---------- undo / redo ---------- */
const undoStack = [], redoStack = [];
function snap_() { return JSON.stringify(state.shapes); }
function pushUndo() {
  undoStack.push(snap_());
  if (undoStack.length > 100) undoStack.shift();
  redoStack.length = 0;
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(snap_());
  state.shapes = JSON.parse(undoStack.pop());
  sel.clear(); render(); renderProps(); autosave();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(snap_());
  state.shapes = JSON.parse(redoStack.pop());
  sel.clear(); render(); renderProps(); autosave();
}

/* ---------- narzędzia pomocnicze ---------- */
function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(t._tm); t._tm = setTimeout(() => t.classList.remove('on'), 2600);
}
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const escXml = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
  .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const sanitizeFile = s => (s || 'projekt').replace(/[\\/:*?"<>|]+/g, '_').trim() || 'projekt';
const isProjectApp = app => app === 'prodrys' || app === 'proddraw';

function worldPt(e) {
  const r = cv.getBoundingClientRect();
  return { x: (e.clientX - r.left - view.x) / view.z,
           y: (e.clientY - r.top - view.y) / view.z };
}
function bboxOf(s) {
  if (s.type === 'line') {
    const x = Math.min(s.x1, s.x2), y = Math.min(s.y1, s.y2);
    return { x, y, w: Math.abs(s.x2 - s.x1), h: Math.abs(s.y2 - s.y1) };
  }
  if (s.type === 'text') {
    const lines = String(s.text || '').split('\n');
    const w = Math.max(...lines.map(l => l.length), 1) * s.fs * 0.6;
    return { x: s.x, y: s.y, w, h: lines.length * s.fs * 1.25 };
  }
  return { x: s.x, y: s.y, w: s.w, h: s.h };
}
function unionBBox(shapes) {
  if (!shapes.length) return null;
  let x1 = 1e9, y1 = 1e9, x2 = -1e9, y2 = -1e9;
  for (const s of shapes) {
    const b = bboxOf(s);
    x1 = Math.min(x1, b.x); y1 = Math.min(y1, b.y);
    x2 = Math.max(x2, b.x + b.w); y2 = Math.max(y2, b.y + b.h);
  }
  return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
}
const selShapes = () => state.shapes.filter(s => sel.has(s.id));

/* zaznaczenie rozszerza się na całą grupę */
function expandGroup(id) {
  const s = state.shapes.find(a => a.id === id);
  if (!s) return [id];
  if (!s.g) return [id];
  return state.shapes.filter(a => a.g === s.g).map(a => a.id);
}

/* ---------- ZIP: zapis (STORE) + odczyt ---------- */
const CRC_T = (() => { const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) { let c = n;
    for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
    t[n] = c; } return t; })();
function crc32(u8) { let c = 0xFFFFFFFF;
  for (let i = 0; i < u8.length; i++) c = CRC_T[(c ^ u8[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0; }

function makeZip(files) { // files: [{name, data:Uint8Array}]
  const enc = new TextEncoder(), parts = [], central = []; let off = 0;
  for (const f of files) {
    const nb = enc.encode(f.name), crc = crc32(f.data);
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0, 0x04034b50, true); lh.setUint16(4, 20, true);
    lh.setUint32(14, crc, true);
    lh.setUint32(18, f.data.length, true); lh.setUint32(22, f.data.length, true);
    lh.setUint16(26, nb.length, true);
    parts.push(new Uint8Array(lh.buffer), nb, f.data);
    const ch = new DataView(new ArrayBuffer(46));
    ch.setUint32(0, 0x02014b50, true); ch.setUint16(4, 20, true); ch.setUint16(6, 20, true);
    ch.setUint32(16, crc, true);
    ch.setUint32(20, f.data.length, true); ch.setUint32(24, f.data.length, true);
    ch.setUint16(28, nb.length, true); ch.setUint32(42, off, true);
    central.push(new Uint8Array(ch.buffer), nb);
    off += 30 + nb.length + f.data.length;
  }
  let cdSize = 0; central.forEach(p => cdSize += p.length);
  const eo = new DataView(new ArrayBuffer(22));
  eo.setUint32(0, 0x06054b50, true);
  eo.setUint16(8, files.length, true); eo.setUint16(10, files.length, true);
  eo.setUint32(12, cdSize, true); eo.setUint32(16, off, true);
  return new Blob([...parts, ...central, new Uint8Array(eo.buffer)], { type: 'application/zip' });
}

async function inflateRaw(u8) {
  const ds = new DecompressionStream('deflate-raw');
  const stream = new Blob([u8]).stream().pipeThrough(ds);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function readZipMedia(buf) { // wyciąga xl/media/* z xlsx
  const u8 = new Uint8Array(buf), dv = new DataView(buf);
  let eocd = -1;
  for (let i = u8.length - 22; i >= Math.max(0, u8.length - 70000); i--)
    if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break; }
  if (eocd < 0) throw new Error('Nieprawidłowy plik ZIP/XLSX');
  const count = dv.getUint16(eocd + 10, true), cdOff = dv.getUint32(eocd + 16, true);
  const td = new TextDecoder(); const out = []; let p = cdOff;
  for (let n = 0; n < count; n++) {

function gridArrange(resize) {
  const ss = selShapes().filter(s => s.type !== 'line');
  if (ss.length < 2) return toast('Zaznacz min. 2 kształty (linie pomijane)');
  pushUndo();
  const items = ss.map(s => ({ s, b: bboxOf(s) }));
  const hs = items.map(i => i.b.h).sort((a, b) => a - b);
  const medH = hs[hs.length >> 1] || 20;
  /* wiersze wg środka Y (klaster), kolumny wg X */
  items.sort((a, b) => (a.b.y + a.b.h / 2) - (b.b.y + b.b.h / 2));
  const rows = [];
  for (const it of items) {
    const cy = it.b.y + it.b.h / 2;
    const row = rows[rows.length - 1];
    if (!row || cy - row.cy > medH * 0.7) rows.push({ cy, items: [it] });
    else row.items.push(it);
  }
  rows.forEach(r => r.items.sort((a, b) => a.b.x - b.b.x));
  const U = unionBBox(ss);
  const gap = matrixGap;
  if (resize) {
    /* Per-row: uniform height = max height in that row */
    for (const row of rows) {
      const rowH = Math.max(...row.items.map(i => i.b.h));
      for (const it of row.items)
        if (it.s.h !== undefined) { it.s.h = rowH; it.b = bboxOf(it.s); }
    }
    /* Per-column: uniform width = max width in that column */
    const numColumns = Math.max(...rows.map(r => r.items.length));
    for (let j = 0; j < numColumns; j++) {
      const cw = Math.max(...rows.map(r => r.items[j] ? r.items[j].b.w : 0));
      for (const row of rows)
        if (row.items[j] && row.items[j].s.w !== undefined) {
          row.items[j].s.w = cw; row.items[j].b = bboxOf(row.items[j].s);
        }
    }
  }
  const nCols = Math.max(...rows.map(r => r.items.length));
  const colW = [];
  for (let j = 0; j < nCols; j++)
    colW[j] = Math.max(...rows.map(r => r.items[j] ? r.items[j].b.w : 0));
  let y = U.y;
  for (const r of rows) {
    const rh = Math.max(...r.items.map(i => i.b.h));
    let x = U.x;
    r.items.forEach((it, j) => {
      moveShapeTo(it.s, x, y + (rh - it.b.h) / 2);
      x += colW[j] + gap;
    });
    y += rh + gap;
  }
  render(); renderProps(); autosave();
}
/* ---------- kolejność (z-order) ---------- */
function zOrder(kind) {
  pushUndo();
  const selected = state.shapes.filter(s => sel.has(s.id));
  const rest = state.shapes.filter(s => !sel.has(s.id));
  if (kind === 'top') state.shapes = [...rest, ...selected];
  else if (kind === 'bot') state.shapes = [...selected, ...rest];
  else {
    const arr = state.shapes;
    const idxs = arr.map((s, i) => sel.has(s.id) ? i : -1).filter(i => i >= 0);
    if (kind === 'up') {
      for (let k = idxs.length - 1; k >= 0; k--) {
        const i = idxs[k];
        if (i < arr.length - 1 && !sel.has(arr[i + 1].id))
          [arr[i], arr[i + 1]] = [arr[i + 1], arr[i]];
      }
    } else {
      for (const i of idxs)
        if (i > 0 && !sel.has(arr[i - 1].id))
          [arr[i], arr[i - 1]] = [arr[i - 1], arr[i]];
    }
  }
  render(); autosave();
}
/* ---------- grupy ---------- */
function groupSel() {
  if (sel.size < 2) return;
  pushUndo();
  const g = 'G' + Date.now().toString(36);
  selShapes().forEach(s => s.g = g);
  render(); renderProps(); autosave();
  toast('Zgrupowano');
}
function ungroupSel() {
  pushUndo();
  selShapes().forEach(s => delete s.g);
  render(); renderProps(); autosave();
  toast('Rozgrupowano');
}
function duplicateSel() {
  const ss = selShapes(); if (!ss.length) return;
  pushUndo();
  const gmap = {};
  const copies = ss.map(s => {
    const c = JSON.parse(JSON.stringify(s));
    c.id = uid();
    if (c.g) { gmap[c.g] = gmap[c.g] || ('G' + uid()); c.g = gmap[c.g]; }
    if (c.type === 'line') { c.x1 += 14; c.y1 += 14; c.x2 += 14; c.y2 += 14; }
    else { c.x += 14; c.y += 14; }
    return c;
  });
  state.shapes.push(...copies);
  setSelection(copies.map(c => c.id)); autosave();
}
function deleteSel() {
  if (!sel.size) return;
  pushUndo();
  state.shapes = state.shapes.filter(s => !sel.has(s.id));
  sel.clear(); render(); renderProps(); autosave();
}

function saveToLib() {
  const ss = selShapes(); if (!ss.length) return toast('Najpierw zaznacz kształty');
  const name = prompt('Nazwa grupy w bibliotece:', 'Linia wymiarowa');
  if (!name) return;
  const b = unionBBox(ss);
  const shapes = ss.map(s => {
    const c = JSON.parse(JSON.stringify(s));
    delete c.id; delete c.g;
    if (c.type === 'line') { c.x1 -= b.x; c.y1 -= b.y; c.x2 -= b.x; c.y2 -= b.y; }
    else { c.x -= b.x; c.y -= b.y; }
    return c;
  });
  lib.push({ name, shapes });
  saveLib(); renderLib();
  toast('Zapisano do biblioteki: ' + name);
}
function placeLib(item) {
  pushUndo();
  const r = cv.getBoundingClientRect();
  const c = { x: (r.width / 2 - view.x) / view.z, y: (r.height / 2 - view.y) / view.z };
  const b = unionBBox(item.shapes) || { w: 0, h: 0 };
  const off = snapPt({ x: c.x - b.w / 2, y: c.y - b.h / 2 }); guides = [];
  const g = 'G' + Date.now().toString(36);
  const copies = item.shapes.map(s => {
    const n = JSON.parse(JSON.stringify(s));
    n.id = uid(); n.g = g;
    if (n.type === 'line') { n.x1 += off.x; n.y1 += off.y; n.x2 += off.x; n.y2 += off.y; }
    else { n.x += off.x; n.y += off.y; }
    return n;
  });
  state.shapes.push(...copies);
  setSelection(copies.map(a => a.id)); autosave();
}

async function generateVariants() {
  if (!state.shapes.length) return toast('Płótno jest puste');
  const proj = sanitizeFile($('#projName').value);
  const files = [];
  const region = pageRegion();
  toast('Generowanie wariantów…');
  for (const row of state.vars.rows) {
    const b = buildSVG(state.shapes, row.vals, 16, region);
    if (!b) continue;
    const png = await svgToPngBlob(b.svg, b.w, b.h, 2);
    files.push({ name: proj + '_' + sanitizeFile(row.name) + '.png',
      data: new Uint8Array(await png.arrayBuffer()) });
  }
  if (!files.length) return toast('Brak wariantów do wygenerowania');
  downloadBlob(makeZip(files), proj + '_warianty.zip');
  toast('Gotowe: ' + files.length + ' plików PNG w ZIP');
}

function loadProject(obj) {
  if (!obj || !isProjectApp(obj.app) || !Array.isArray(obj.shapes))
    return toast('To nie jest plik projektu ProdDraw');
  pushUndo();
  state.name = obj.name || 'Projekt';
  $('#projName').value = state.name;
  state.shapes = obj.shapes;
  state.vars = obj.vars && obj.vars.cols ? obj.vars : { cols: [], rows: [] };
  state.page = obj.page && obj.page.mode ? obj.page : { mode: 'off' };
  syncPageUI(); fitPage();
  /* scal bibliotekę z projektu (bez duplikatów nazw) */
  if (Array.isArray(obj.lib)) {
    for (const it of obj.lib)
      if (!lib.some(l => l.name === it.name)) lib.push(it);
    saveLib(); renderLib();
  }
  sel.clear(); previewRow = -1;
  render(); renderProps(); renderVars(); autosave();
  toast('Wczytano projekt: ' + state.name);
}

function autosave() {
  clearTimeout(autosaveTm);
  autosaveTm = setTimeout(() => {
    try { localStorage.setItem('prodrys_auto', projectJSON()); } catch (e) {}
  }, 400);
}
async function exportJPG() {
  const region = pageRegion();
  if (!state.shapes.length && !region) return toast('Płótno jest puste');
  const b = buildSVG(state.shapes, currentVals(), 16, region);
  const jpg = await svgToPngBlob(b.svg, b.w, b.h, 2, 'image/jpeg', 0.92);
  let name = sanitizeFile($('#projName').value);
  if (previewRow >= 0 && state.vars.rows[previewRow])
    name += '_' + sanitizeFile(state.vars.rows[previewRow].name);
  downloadBlob(jpg, name + '.jpg');
  toast('Wyeksportowano: ' + name + '.jpg');
}

function insertImageURL(url) {
  const img = new Image();
  img.onload = () => {
    pushUndo();
    const maxW = 480;
    const k = img.naturalWidth > maxW ? maxW / img.naturalWidth : 1;
    const r = cv.getBoundingClientRect();
    const c = { x: (r.width / 2 - view.x) / view.z, y: (r.height / 2 - view.y) / view.z };
    const s = { id: uid(), type: 'image', href: url,
      x: c.x - img.naturalWidth * k / 2, y: c.y - img.naturalHeight * k / 2,
      w: img.naturalWidth * k, h: img.naturalHeight * k };
    state.shapes.push(s);
    setSelection([s.id]); setTool('select'); autosave();
  };
  img.onerror = () => toast('Nie udało się wczytać obrazu');
  img.src = url;
}
function buildImageShapeFromURL(url, offset = 0) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 480;
      const k = img.naturalWidth > maxW ? maxW / img.naturalWidth : 1;
      const r = cv.getBoundingClientRect();
      const c = { x: (r.width / 2 - view.x) / view.z, y: (r.height / 2 - view.y) / view.z };
      res({
        id: uid(), type: 'image', href: url,
        x: c.x - img.naturalWidth * k / 2 + offset,
        y: c.y - img.naturalHeight * k / 2 + offset,
        w: img.naturalWidth * k, h: img.naturalHeight * k
      });
    };
    img.onerror = () => rej(new Error('Image load failed'));
    img.src = url;
  });
}
function fileToDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
/* wklejanie: obraz ze schowka (np. zrzut z CATII) lub skopiowane kształty */
document.addEventListener('paste', async e => {
  if (document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
  const items = [...(e.clipboardData?.items || [])];
  const imgItem = items.find(i => i.type.startsWith('image/'));
  if (imgItem) {
    e.preventDefault();
    insertImageURL(await fileToDataURL(imgItem.getAsFile()));
    toast('Wklejono obraz ze schowka');
    return;
  }
  if (clip) { e.preventDefault(); pasteClip(); }
});
function copySel() {
  const ss = selShapes(); if (!ss.length) return;
  clip = JSON.stringify(ss);
  toast('Skopiowano: ' + ss.length);

function pasteClip() {
  if (!clip) return;
  pushUndo();
  const gmap = {};
  const copies = JSON.parse(clip).map(s => {
    s.id = uid();
    if (s.g) { gmap[s.g] = gmap[s.g] || ('G' + uid()); s.g = gmap[s.g]; }
    if (s.type === 'line') { s.x1 += 18; s.y1 += 18; s.x2 += 18; s.y2 += 18; }
    else { s.x += 18; s.y += 18; }
    return s;
  });
  state.shapes.push(...copies);
  setSelection(copies.map(c => c.id)); autosave();
}

    renderXlsxImportPicker(skippedEMF);
  });
  xlsxImportItems.forEach((it, idx) => {
    const d = document.createElement('div');
    d.className = 'xlImg';
    const checked = it.selected ? 'checked' : '';
    if (it.kind === 'image') {
      d.innerHTML = `<div class="xlSel"><label><input type="checkbox" data-xlpick="${idx}" ${checked}> Image</label></div><img src="${it.previewUrl}"><div>${escXml(it.name)}</div>`;
    } else {
      d.innerHTML = `<div class="xlSel"><label><input type="checkbox" data-xlpick="${idx}" ${checked}> Shape</label></div><div class="xlShapePrev"><svg viewBox="0 0 120 90">${shapeSVG(it.shape, null, false)}</svg></div><div>${escXml(it.name)}</div>`;
    }
    body.appendChild(d);
  });
  $$('#xlBody [data-xlpick]').forEach(cb => cb.addEventListener('change', e => {
    const i = +e.target.dataset.xlpick;
    xlsxImportItems[i].selected = e.target.checked;
  }));
  if (skippedEMF) {
    const w = document.createElement('div');
    w.className = 'hint'; w.style.gridColumn = '1/-1';
    w.textContent = `Skipped ${skippedEMF} EMF/WMF images (Excel vector format — not supported in browser).`;
    body.appendChild(w);
  }
}
function cloneShapesWithFreshIds(shapes) {
  const gMap = {};
  return shapes.map(s => {
    const n = JSON.parse(JSON.stringify(s));
    n.id = uid();
    if (n.g) { gMap[n.g] = gMap[n.g] || ('G' + uid()); n.g = gMap[n.g]; }
    return n;
  });
}
async function applySelectedXlsxItems() {
  const selected = xlsxImportItems.filter(i => i.selected);
  if (!selected.length) return toast('Nothing selected');
  state.page = { mode: 'off' };
  syncPageUI();
  pushUndo();
  const add = [];
  let imageN = 0, shapeN = 0;
  for (const it of selected) {
    if (it.kind === 'shape') {
      add.push(...cloneShapesWithFreshIds([it.shape]));
      shapeN++;
    } else {
      try {
        const dataUrl = await fileToDataURL(new Blob([it.data], { type: it.mime }));
        if (it.anchored) {
          add.push({ id: uid(), type: 'image', href: dataUrl, x: it.x, y: it.y, w: it.w, h: it.h });
        } else {
          add.push(await buildImageShapeFromURL(dataUrl, imageN * 18));
        }
        imageN++;
      } catch (e) {}
    }
  }
  if (!add.length) return toast('Import failed');
  state.shapes.push(...add);
  setSelection(add.map(a => a.id));
  render(); renderProps(); autosave();
  closeXlsxModal();
  toast(`Imported ${imageN} images + ${shapeN} shapes`);
}
/* import XLSX/XLSM — selective images + shapes */
async function importXlsx(file) {
  try {
    if (typeof DecompressionStream === 'undefined')
      return toast('Browser does not support decompression — use Chrome/Edge');
    toast('Reading file…');
    const buf = await file.arrayBuffer();
    const allFiles = await readZipAll(buf);
    const td = new TextDecoder();
    const mediaFiles = allFiles.filter(f => /^xl\/media\//i.test(f.name) && /\.(png|jpe?g|gif|bmp|webp)$/i.test(f.name));
    const mediaMap = {};
    mediaFiles.forEach(m => mediaMap[m.name] = { data: m.data, mime: mediaMimeFromName(m.name) });
    const sheetFile = allFiles.find(f => /^xl\/worksheets\/sheet\d+\.xml$/i.test(f.name));
    const sheetXml = sheetFile ? td.decode(sheetFile.data) : '';
    const dims = parseSheetDims(sheetXml);
    const drawingFiles = allFiles.filter(f => /^xl\/drawings\/drawing\d+\.xml$/i.test(f.name));
    const importedShapes = [];
    const anchoredPictures = [];
    let unsupportedFallbacks = 0;
    for (const df of drawingFiles) {
      const relPath = df.name.replace(/^xl\/drawings\//i, 'xl/drawings/_rels/') + '.rels';
      const relFile = allFiles.find(f => f.name === relPath);
      const relMap = relFile ? parseDrawingRels(td.decode(relFile.data), df.name) : {};
      const parsed = parseDrawingShapes(td.decode(df.data), dims, relMap, mediaMap);
      importedShapes.push(...parsed.shapes);
      anchoredPictures.push(...parsed.pictures.map(p => ({ ...p, anchored: true })));
      unsupportedFallbacks += parsed.unsupportedFallbacks || 0;
    }
    const skippedEMF = allFiles.filter(f => /^xl\/media\//i.test(f.name) && /\.(emf|wmf)$/i.test(f.name)).length;
    if (!mediaFiles.length && !importedShapes.length && !anchoredPictures.length)
      return toast('No supported images or shapes found in file' + (skippedEMF ? ` (${skippedEMF} EMF/WMF skipped)` : ''));
    closeXlsxModal();
    xlsxImportItems = [];
    const usedAnchored = new Set(anchoredPictures.map(p => 'xl/media/' + p.name.replace(/^xl\/media\//i, '')));
    for (const p of anchoredPictures) {
      xlsxImportItems.push({
        kind: 'image',
        name: p.name,
        data: p.data,
        mime: p.mime,
        anchored: true,
        x: p.x, y: p.y, w: p.w, h: p.h,
        previewUrl: URL.createObjectURL(new Blob([p.data], { type: p.mime })),
        selected: true
      });
    }
    for (const m of mediaFiles) {
      if (usedAnchored.has(m.name)) continue;
      const mime = mediaMimeFromName(m.name);
      xlsxImportItems.push({
        kind: 'image',
        name: m.name.replace('xl/media/', ''),
        data: m.data,
        mime,
        anchored: false,
        previewUrl: URL.createObjectURL(new Blob([m.data], { type: mime })),
        selected: true
      });
    }
    importedShapes.forEach((s, i) => xlsxImportItems.push({ kind: 'shape', name: `${s.type}_${i + 1}`, shape: s, selected: true }));
    const imgN = xlsxImportItems.filter(i => i.kind === 'image').length;
    const shapeN = xlsxImportItems.length - imgN;
    $('#xlModal').querySelector('h3').textContent = `XLSX Import — ${imgN} images + ${shapeN} shapes`;
    renderXlsxImportPicker(skippedEMF);
    if (unsupportedFallbacks) {
      const w = document.createElement('div');
      w.className = 'hint'; w.style.gridColumn = '1/-1';
      w.textContent = `Fallback: ${unsupportedFallbacks} unsupported Office shapes imported as images.`;
      $('#xlBody').appendChild(w);
    }
    $('#xlModal').classList.add('on');
  } catch (err) { toast('Import error: ' + err.message); }
}

/* =====================================================================
   PASEK GÓRNY, NARZĘDZIA, KLAWIATURA, INICJALIZACJA
   ===================================================================== */
function setTool(t) {
  tool = t;
  $$('.tool').forEach(b => b.classList.toggle('on', b.dataset.tool === t));
  cv.setAttribute('class', 't-' + t);
}
$$('.tool').forEach(b => b.addEventListener('click', () => {
  if (b.dataset.tool === 'image') { $('#fImg').click(); return; }
  if (b.dataset.tool === 'shapes') { openShapeModal(); return; }
  setTool(b.dataset.tool);
}));
$$('.tab').forEach(b => b.addEventListener('click', () => {
  $$('.tab').forEach(t => t.classList.toggle('on', t === b));
  $$('.tabBody').forEach(t => t.classList.toggle('on', t.id === 'tab-' + b.dataset.tab));
}));
/* ---------- format kanwy + szablon ---------- */
function pageRegion() {
  const P = state.page;
  return P && P.mode !== 'off' ? { x: 0, y: 0, w: P.w, h: P.h } : null;
}
function fitPage() {
  const r = cv.getBoundingClientRect();
  const P = state.page;
  if (!P || P.mode === 'off') { view = { x: 60, y: 60, z: 1 }; return; }
  const z = clamp(Math.min((r.width - 80) / P.w, (r.height - 80) / P.h), 0.08, 2);
  view = { x: (r.width - P.w * z) / 2, y: (r.height - P.h * z) / 2, z };
}
function syncPageUI() {
  const P = state.page || { mode: 'off' };
  $('#pageSel').value = P.mode;
  $('#pageWH').style.display = P.mode === 'custom' ? '' : 'none';
  if (P.w) { $('#pageW').value = P.w; $('#pageH').value = P.h; }
}
function templateShapes(W, H) {
  const g = 'Gorient';
  return [
    { id: uid(), type: 'rect', x: 24, y: 20, w: 340, h: 52, fill: '#ffffff', noFill: false, noStroke: false,
      stroke: '#111827', sw: 2, dash: 'solid', text: 'NR CZĘŚCI:', fs: 16, tc: '#111827', bold: true },
    { id: uid(), type: 'rect', x: 372, y: 20, w: Math.max(200, W - 396), h: 52, fill: '#ffffff', noFill: false, noStroke: false,
      stroke: '#111827', sw: 2, dash: 'solid', text: 'NAZWA:', fs: 16, tc: '#111827', bold: true },
    { id: uid(), g, type: 'line', x1: 40, y1: H - 42, x2: 160, y2: H - 42,
      stroke: '#111827', sw: 3, dash: 'solid', as: false, ae: true },
    { id: uid(), g, type: 'text', x: 62, y: H - 74, text: 'PRZÓD', fs: 15, tc: '#111827', bold: true }
  ];
}
function newFromTemplate() {
  let loaded = false;
  try {
    const tmpl = localStorage.getItem('prodrys_template');
    if (tmpl) {
      const obj = JSON.parse(tmpl);
      if (isProjectApp(obj.app) && Array.isArray(obj.shapes)) {
        state = {
          name: 'Instrukcja_01',
          shapes: JSON.parse(JSON.stringify(obj.shapes)),
          vars: obj.vars && obj.vars.cols ? JSON.parse(JSON.stringify(obj.vars)) : { cols: [], rows: [] },
          page: obj.page && obj.page.mode ? JSON.parse(JSON.stringify(obj.page)) : { mode: 'a4l', w: PAGES.a4l.w, h: PAGES.a4l.h }
        };
        /* assign fresh IDs so each project is independent */
        state.shapes.forEach(s => { s.id = uid(); });
        loaded = true;
      }
    }
  } catch (e) {}
  if (!loaded) {
    state = { name: 'Instrukcja_01', shapes: [], vars: { cols: [], rows: [] },
      page: { mode: 'a4l', w: PAGES.a4l.w, h: PAGES.a4l.h } };
    state.shapes = templateShapes(state.page.w, state.page.h);
  }
  $('#projName').value = state.name;
  sel.clear(); previewRow = -1;
  undoStack.length = 0; redoStack.length = 0;
  syncPageUI(); fitPage();
  render(); renderProps(); renderVars(); autosave();
}
function saveAsTemplate() {
  if (!confirm('Zapisać bieżący projekt jako domyślny szablon dla nowych projektów?')) return;
  try {
    const tmpl = { app: 'proddraw', version: 2,
      shapes: JSON.parse(JSON.stringify(state.shapes)),
      vars: JSON.parse(JSON.stringify(state.vars)),
      page: JSON.parse(JSON.stringify(state.page)) };
    localStorage.setItem('prodrys_template', JSON.stringify(tmpl));
    toast('Zapisano jako domyślny szablon — użyty przy następnym „Nowy"');
  } catch (e) { toast('Błąd zapisu szablonu'); }
}
function exportSettings() {
  const settings = { app: 'proddraw-settings', version: 1, lib: JSON.parse(JSON.stringify(lib)) };
  try { const t = localStorage.getItem('prodrys_template'); if (t) settings.template = JSON.parse(t); } catch (e) {}
  downloadBlob(new Blob([JSON.stringify(settings, null, 1)], { type: 'application/json' }), 'proddraw_ustawienia.json');
  toast('Wyeksportowano ustawienia (biblioteka + szablon)');
}
function importSettings(obj) {
  if (!obj || !['prodrys-settings', 'proddraw-settings'].includes(obj.app)) return toast('Nieprawidłowy plik ustawień');
  let added = 0;
  if (Array.isArray(obj.lib)) {
    for (const it of obj.lib) if (!lib.some(l => l.name === it.name)) { lib.push(it); added++; }
    saveLib(); renderLib();
  }
  if (obj.template) {
    try { localStorage.setItem('prodrys_template', JSON.stringify(obj.template)); } catch (e) {}
  }
  toast('Zaimportowano ustawienia' + (added ? ` (+${added} do biblioteki)` : '') + (obj.template ? ' + szablon' : ''));
}
$('#pageSel').addEventListener('change', () => {
  const m = $('#pageSel').value;
  if (m === 'off') state.page = { mode: 'off' };
  else if (m === 'custom') state.page = { mode: 'custom',
    w: +$('#pageW').value || 1123, h: +$('#pageH').value || 794 };
  else state.page = { mode: m, w: PAGES[m].w, h: PAGES[m].h };
  syncPageUI();
  if (m !== 'off') fitPage();
  render(); autosave();
});
['pageW', 'pageH'].forEach(id => $('#' + id).addEventListener('change', () => {
  if (state.page.mode !== 'custom') return;
  state.page.w = Math.max(50, +$('#pageW').value || 1123);
  state.page.h = Math.max(50, +$('#pageH').value || 794);
  fitPage(); render(); autosave();
}));
$('#bNew').addEventListener('click', () => {
  if (!confirm('Nowy projekt z szablonu? Niezapisane zmiany zostaną utracone.')) return;
  newFromTemplate();
});
$('#bTmpl').addEventListener('click', saveAsTemplate);
$('#bExpSet').addEventListener('click', exportSettings);
$('#bImpSet').addEventListener('click', () => $('#fSettings').click());
$('#fSettings').addEventListener('change', async e => {
  const f = e.target.files[0]; e.target.value = '';
  if (!f) return;
  try { importSettings(JSON.parse(await f.text())); }
  catch (err) { toast('Nieprawidłowy plik ustawień'); }
});
$('#bSave').addEventListener('click', saveProject);
$('#bOpen').addEventListener('click', () => $('#fOpen').click());
$('#fOpen').addEventListener('change', async e => {
  const f = e.target.files[0]; e.target.value = '';
  if (!f) return;
  try { loadProject(JSON.parse(await f.text())); }
  catch (err) { toast('Nieprawidłowy plik projektu'); }
});
$('#bXlsx').addEventListener('click', () => $('#fXlsx').click());
$('#fXlsx').addEventListener('change', e => {
  const f = e.target.files[0]; e.target.value = '';
  if (f) importXlsx(f);
});
$('#fImg').addEventListener('change', async e => {
  const f = e.target.files[0]; e.target.value = '';

$('#xlClose').addEventListener('click', closeXlsxModal);
$('#shapeClose').addEventListener('click', () => $('#shapeModal').classList.remove('on'));
$('#bZoomOut').addEventListener('click', () => zoomAtCenter(1 / 1.25));
$('#bZoomIn').addEventListener('click', () => zoomAtCenter(1.25));
$('#bJpg').addEventListener('click', exportJPG);
$('#bUndo').addEventListener('click', undo);
$('#bRedo').addEventListener('click', redo);
$('#projName').addEventListener('change', autosave);
$('#gridSize').addEventListener('change', render);

document.addEventListener('keydown', e => {
  const inField = document.activeElement &&
    ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName);
  if (e.code === 'Space' && !inField) { spaceDown = true; cv.classList.add('t-pan'); e.preventDefault(); }
  if (inField) return;
  const K = e.key.toLowerCase();
  if (e.ctrlKey || e.metaKey) {
    if (K === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); }
    else if (K === 'y') { e.preventDefault(); redo(); }
    else if (K === 's') { e.preventDefault(); saveProject(); }
    else if (K === 'c') { e.preventDefault(); copySel(); }
    else if (K === 'd') { e.preventDefault(); duplicateSel(); }
    else if (K === 'a') { e.preventDefault(); setSelection(state.shapes.map(s => s.id)); }
    else if (K === 'g') { e.preventDefault(); e.shiftKey ? ungroupSel() : groupSel(); }
    return;
  }
  if (K === 'delete' || K === 'backspace') { e.preventDefault(); deleteSel(); }
  else if (K === 'escape') { sel.clear(); setTool('select'); render(); renderProps(); }
  else if (K === 'v') setTool('select');
  else if (K === 'r') setTool('rect');
  else if (K === 'c') setTool('ellipse');
  else if (K === 'l') setTool('line');
  else if (K === 'a') setTool('arrow');
  else if (K === 't') setTool('text');
  else if (K === 's') openShapeModal();
  else if (K === 'i') $('#fImg').click();
  else if (e.key === '=' || e.key === '+' || K === '+') { e.preventDefault(); zoomAtCenter(1.25); }
  else if (e.key === '-' || K === '-') { e.preventDefault(); zoomAtCenter(1 / 1.25); }
  else if (e.key.startsWith('Arrow') && sel.size) {
    e.preventDefault(); pushUndo();
    const d = e.shiftKey ? 10 : 1;
    const dx = e.key === 'ArrowLeft' ? -d : e.key === 'ArrowRight' ? d : 0;
    const dy = e.key === 'ArrowUp' ? -d : e.key === 'ArrowDown' ? d : 0;
    selShapes().forEach(s => {
      if (s.type === 'line') { s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy; }
      else { s.x += dx; s.y += dy; }
    });
    render(); refreshXYWH(); autosave();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceDown = false; cv.setAttribute('class', 't-' + tool); }
});
window.addEventListener('beforeunload', () => {
  try { localStorage.setItem('prodrys_auto', projectJSON()); } catch (e) {}
});

/* ---------- start ---------- */
(function init() {
  try { const l = localStorage.getItem('prodrys_lib');
    lib = l ? JSON.parse(l) : null; } catch (e) { lib = null; }
  if (!Array.isArray(lib) || !lib.length) seedLib();
  /* odśwież wbudowane elementy biblioteki do aktualnej wersji */
  for (const d of defaultLibItems()) {
    const i = lib.findIndex(l => l.name === d.name);
    if (i >= 0) lib[i] = d; else lib.unshift(d);
  }
  saveLib();
  let restored = false;
  try {
    const a = localStorage.getItem('prodrys_auto');
    if (a) {
      const obj = JSON.parse(a);
      if (isProjectApp(obj.app) && Array.isArray(obj.shapes) && obj.shapes.length) {
        state.name = obj.name || state.name;
        $('#projName').value = state.name;
        state.shapes = obj.shapes;
        state.vars = obj.vars && obj.vars.cols ? obj.vars : { cols: [], rows: [] };
        state.page = obj.page && obj.page.mode ? obj.page : { mode: 'off' };
        restored = true;
        toast('Przywrócono autozapis');
      }
    }
  } catch (e) {}
  if (restored) { syncPageUI(); fitPage(); render(); renderProps(); renderVars(); }
  else newFromTemplate();
  renderLib();
})();
</script>
